body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉編時事第一黑白懺摩篇四法初先明悔過法梵語懺摩此翻悔過謂犯罪之人應如法悔過也本云阿鉢底提舍那阿鉢底是罪提舍那是說應云說罪謂自知有罪當向清淨比丘傾心吐露如實而說也又云懺悔懺是西音悔是東語此乃華梵雙衆也天台光明釋懺悔品不辨華梵但直釋云懺者首也悔者伏也如世人得罪於王伏欵順從不敢違逆不逆為伏順從為首應云首伏犯戒之人亦復如是必須生大慚愧具大怖畏伏欵三寶足下直心發露順從僧教依法懺悔也義淨律師云懺磨者西音忍義西國人誤觸彼身云懺磨意是請恕願勿嗔責此方誤傳久矣難可改張謂順此土之方規故即云懺摩乃大同小異也應法師云懺訛略也書無懺字正言又摩此云忍謂容我恕罪也律中正名懺悔懺名白法悔名黑法謂黑法須悔而勿作白法須企面尚之取捨合論故言懺悔又懺名修來悔名改往謂往日所作不善法鄙而惡之誓不再作故名為悔往日所棄一切善法今日已去誓願勤修故名為懺棄往求來故名懺悔又懺名披陳衆失發露過咎不敢隱諱悔名斷相續心厭悔捨離能作所作合棄故言懺悔又翻云浣染成淨此乃以喻而顯法也大集經云譬如百年垢穢之衣若能一日盡心浣潔以人工力故即得鮮淨懺悔亦然假使百劫世中所集諸不善業若能一日洗心發露懇切懺悔者以佛法力故所有諸罪即得消滅故名浣染成淨也又懺者名慚悔者名愧慚則慚天愧則愧人人見其顯天見其冥冥細顯粗粗細皆惡故當生重慚愧至誠懺悔淨名疏云今明罪滅有三一依毗尼門作法懺滅違無作罪二依定門觀相懺滅性罪三依慧門觀無生懺滅妄想罪復次違無作罪障戒性罪障定妄想罪障慧然慧由定發定由戒生今作法懺雖性罪不滅而得清淨尸羅發生定慧是故特須尊重於戒而諸福中懺悔為最故論云大石雖重假舟航力彼岸可登針芥雖微不借人持莫能遠去犯者亦然不怕罪重業深但能慚愧改革即得身心清淨只恐小過微愆不肯傾心吐露而地獄罪苦終不能除故經云有慚愧者可名為人若不慚愧與諸禽獸不相異也二如律審戒法准根本律云若一界內惟比丘共住者遇白半月於十四日先懺摩如黑半月大小在二十九八日斯有二義一者律制犯者不得誦戒亦不得聞戒犯者不得向犯者發露犯者亦不得受犯者懺悔故制於布薩之前令盡集法堂如律預問大衆決疑自他兩利二者犯罪之人於布薩時發露懺悔仍恐羈遲說戒聽衆疲勞故預立此法也同居大衆若於五篇戒相中輕重有犯者當以慚愧水洗浴識塵執發露刀割覆藏網憑僧先悔令戒身具足清淨布薩此乃是仗衆僧拔苦以見戒和同修也若有智慧人才犯之時即生惶怖稽首三寶前傾倒過咎志心懺悔不待臨時審問也律云時分將至知事人應差求寂或年少比丘詣羯磨堂掃灑令淨敷座然燈於正座後傍設一小桌書記候録人事仍恐名同事異以便詳察至初夜分開大靜時接揵捶律論後改此椎字此是打鼓一通計五十四下初緩緩重打二十下次漸緊稍輕打二十一下後緊收輕輕打十二下復連椎重擊兩下是為五十四也餘集僧打法准此衆僧間已各搭七衣持具整肅威儀鴈行而出至法堂已先禮佛一拜序立兩傍僧盡集已一首頷執香二引磬隨後請一堪能羯磨者臨堂為衆作法然彼師亦不得在寮中待其請至此乃僧法羯磨不同新戒懺悔可時應迎到半途其請者迎見即轉身二引磬前行執香者隨後師至法堂先展大具禮佛三拜詣座傍立為首者上香大衆向上排班作禮三拜已師就位拈香三瓣然後坐下若有五戒十戒及菩薩沙彌依住者次序而問知事人呼云諸沙彌次第進堂沙彌問呼整儀而入向上排班已呼云聞磬聲頂禮三拜撩衣拜已復云問訊長跪合掌羯磨師撫尺云諸沙彌汝等既捨五欲親緣受持五十支禁戒為佛弟子號曰息慈理宜嚴護身口業道過非精學隨律威儀教法戒體若淨衆善方生少有染汙至道難入今乃白黑半月布薩之前大僧集會懺悔之際汝等各將本所受持戒品應當諦審忖思從前半月審戒以來乃至於今十三四日中若有犯者向我一一說露以便依律作法浣染成淨若有犯而不言者則自欺增罪非釋種子撫尺問云諸沙彌第一不殺生戒有犯否答無有則言有無則言無不得隱覆下皆准此第二不偷盜戒有犯否第三不淫欲戒有犯否第四不妄語戒有犯否第五不飲酒戒有犯否第六不著香花鬘不香油塗身戒有犯否第七不歌舞倡伎不往觀聽戒有犯否第八不坐高廣大床戒有犯否第九不非時食戒有犯否第十不捉持生像金銀寶物戒於中一一有犯否如上一一答已若總無犯者羯磨師云五十戒既然無犯可稱清淨沙彌作禮而退呼云一拜起具問訊次第出堂上殿俟候隨大衆禮佛問沙彌尼准此五戒亦同惟不問後五條為異次呼菩薩沙彌儀式亦同前座上撫尺云菩薩沙彌諦聽我今問汝菩薩十重四十八輕戒相應當如實而答撫尺問云第一殺戒有犯否答無有當言有無則言無不得虗妄而答後皆准此第二盜戒有犯否第三淫戒有犯否第四妄語戒有犯否第五沽酒戒有犯否第六說四衆過戒有犯否第七自讚毀他戒有犯否第八慳惜加毀戒有犯否第九嗔心不受悔戒有犯否第十謗三寶戒有犯否如上一一答已若無犯者即云十重戒既然無犯我今更問汝四十八輕應當如實而答撫尺云第一不敬師友戒有犯否第二飲酒戒有犯否第三食肉戒有犯否第四食五辛戒有犯否第五不教悔罪戒有犯否乃至第四十八不破法戒於中一一有犯否如前答已若無犯者即云輕重戒相既然無犯可稱清淨菩薩沙彌作禮而退知事人呼云一拜起具問訊上殿去候大衆同禮佛此准菩薩戒相而問輕重既然無犯者則沙彌十戒自雪耳其小大二俱直言答竟座上師稱量人事及法若小小有犯前四性業者依律作不現前白四羯磨滅擯不得共清淨沙彌同事亦不得依止比丘住由非釋子沙彌故若作而不成作者犯應懺突吉羅對首悔除若遭命難因緣律有明訓若有犯後六遮業者故作則有心輕慢佛語犯應懺突吉羅作對者法悔無心誤作則不善守律儀與責心突吉羅罪作心念法滅其小大亦復如是若有犯十重戒者准小乘律法如前滅擯大乘雖許懺悔必須要見先華種種瑞相佛來摩頂方得滅罪若無好相雖懺無益若有犯四十八輕戒者對首懺悔罪便得除不同重戒作法者必須審定犯緣仍分故誤而與懺悔方名為善然茲法範預立於斯有小大則用若無者惟集大僧懺悔耳羯磨師撫尺云僧集否答僧已集和合否和合未受具戒者出否已出若無者答是中無有未受具戒者僧今和合何所作為答懺悔羯磨此集僧不問說欲者律制發露必須自言若不自言不應治罰是以不問也撫尺云諸大德今乃白黑半月未布薩之先我等和集一處人各撫臆自忖三思從前半月誦戒以來乃至於今十三四日中若有干犯佛制汙染戒身者當生慚愧速求清淨向我直言發露切勿覆隱故未曾有經云前心作惡如雲覆日後心起善如炬消暗是知淨染由心懺悔憑律若不能生深信之心具大怖之念縱佛在世亦難懺除諸大德汝等願淨五篇成就五分法身冀嚴三聚不繫三界生死者有犯則出衆說過無犯則端立默然知諸大德清淨撫尺云今問諸大德是中有犯者否若有犯者次第出班向上三拜長跪合掌說所犯事羯磨師當詳究因心及所犯事緣書記師一一録明已犯者一拜起具問訊歸班座上再問第二第三遍已而衆皆默然者維那舉云懺悔功德殊勝行云云大衆同念回向偈畢殿上接鼓三下羯磨起身禮佛一拜或同大衆齊拜亦可拜已迎請者云送師傳答不勞羯磨歸寮三上殿禮佛法大衆齊上殿展具鳴手磬接鼓三通先禮佛三拜問訊已舉普賢王菩薩摩訶薩第二第三稱加南無二字念三稱已鐘鼓煞完再舉南無本師釋迦牟尼佛十二拜南無文殊師利菩薩三拜南無彌勒菩薩三拜南無十方諸佛三拜南無十方菩薩摩訶薩三拜三皈各回此乃是准菩薩戒師長位次禮也若有倍加精勇者各隨方便或通宵禮佛或持誦呪經更好而修行不厭其繁多則愈為善矣四呈罪稱量法羯磨同維那書記或即晚或次日將犯者至方丈門外立執事入門左右立維那知會侍者已請出和尚到公位羯磨合掌向和尚云昨夜懺悔堂中有某大德犯某事發露呈白和尚說已一拜左側立次維那書記同禮一拜呈罪單已左右立定和尚看明維那呼發露者進來脫屣展大具頂禮三拜問訊長跪合掌和尚細問犯者如實說已然後依律制斷當與白四白二對首心念四種羯磨者即應與之然今人信根浮薄恐自力不堅仍令犯者或兼禮諸佛萬德洪名或誦持靈感祕密神呪仗佛菩薩慈悲力加被羯磨懺悔力滅除俾罪障氷消善法日茂如是教已呼彼起立禮謝三拜起具問訊羯磨維那書記如前禮辭而退然懺列三門此是律門兼之於定非慧門所攝也今半月懺摩菩薩僧仍依比丘僧法羯磨而不另作者寧有身戒不淨而云心戒清白者也非謂棄大就小混亂僧規故南山事鈔云欲得正法久住大乘菩薩善護僧制若果是大機淨信於晝夜六時真正持菩薩戒者自然十重氷霜餘輕雪月如偶爾習氣突發而於熟境難禁適有犯者方遵梵網地持二經作大乘懺悔此如大乘玄義十二門分別中所明故不繁引第二半月布薩篇十四法初先知淨住法律云布薩者即說戒也秦言善宿南山云淨住謂清淨身心如戒而住也摩得勒伽論云云何名布薩義謂捨諸惡不善法證得白淨法究竟梵行事故名布薩義十誦律云布薩法者半月半月諸比丘和合一處籌量自身晝作何罪夜作何罪犯與不犯若有過者即應捨離懺悔安住善法故根本律中半月說戒名曰長淨義淨律師云每於黑白半月日日之中須以日數告衆令知或上座曰或知事人云諸大德今是黑白月幾日此有二義一為知褒灑陀時二為防俗人來問以便答故所言褒灑者是長養義陀是持義由集衆說戒能長養善法持自心故善見律云云何得知正法久住佛言布薩法不壞是二起緣說戒法按說戒揵度云佛在羅閲城時諸外道月八日十四日十五日諸人往來共為親友給與欣食極相愛念瓶沙王登樓遙見問知其由王即下樓往禮世尊白所見事願佛令諸比丘亦三時聚會我及羣臣亦來聚會佛即允已王辭禮去佛告諸比丘從今以去聽汝等三時集會彼時但是說法未曾說戒後於異時佛在靜處作是思惟我今為諸比丘結戒應說波羅提木叉中有信心新受戒比丘未得聞戒不知當云何學戒我今寧可聽諸比丘集在一處說波羅提木叉毗尼母論云佛在世時聽諸比丘日日說戒皆生疲厭心囚集會疲極故如來聞已即集僧告言自今已去聽諸比丘半月半月日和集說戒爾時有一住處說戒僧坊既大遠者不聞佛告諸比丘若坊大僧多者聽敷座正中說戒當高聲朗誦使得聞之時諸比丘用歌音誦戒佛言不應爾但高聲了了誦之歌音誦戒有五種過失一者未入道跡之人聞音染著二者為世人所嫌三者與世人歌調無異四者妨廢行道五者妨入定第二分云時布薩日有一比丘入房閉戶而眠諸比丘說戒已起座而去時眠比丘聞聲即起問言諸大德欲何處去將非往作布薩耶諸比丘報言我等說戒已歸來汝向在何處答言我在房中閉戶眠耳諸比丘往白世尊佛言不得白日在房中睡眠說戒日聽上座於小食大食上作白已然後誦戒將結齊時知事人先高聲作如是言結過齊未受戒者先起座客師先請回齊畢起座已上座白大德僧聽今黑白月十四五日布薩白衆僧於某時分集某處誦戒一說十誦律云單白有乎二種有單是白非羯磨有單白即是羯磨此乃是白非羯磨也若晝日有緣所羈應白初夜分若有因緣應廣一略一若無緣阻兩乘俱廣當作兩時集白先作誦比丘戒白次作誦菩薩戒白一菩薩上座比丘於大食小食上白云大德菩薩僧聽今黑白月十四五日布薩白菩薩衆於某時分集某佛殿誦菩薩戒一說若有緣不能兩乘廣者淮小乘白法三淨堂敷座法說戒揵度云於布薩日為上座者當教年少比丘初受戒者掃灑掃灑者以地喻心地掃灑如懺愆表半月半月布薩清淨身心也敷座其座有二種一是高座為說戒者登二是低座為聽戒者設其高座上宜列香花以香表信花表因若非正信淨因則修證無從也備燈火預防夜暗此言晝日布薩也燈火表智暗喻癡障以顯智起則無明破而惑業亡也具水器於中分二一是洗足瓶恐足垢穢汙僧地敷故此方足有鞋襪亦無地敷少此亦得二是洗手盆謂入堂時先當潔手則禮僧無慢以水表定垢喻塵煩若不藉定力則塵情渾濁莫能澄靜也具舍羅此云籌乃記數之物以見界內比丘有若干也以上等物若上座不教年少比丘辨者突吉羅教而不依者亦突吉羅如上具已受欲者回律制有三寶因緣及看病事者聽至堪能持欲者所與欲若有病重人不能動者聽到彼處索欲故須待受欲者回也時至打揵椎梵語臂吒此云打梵語揵椎此云所打之木又翻為聲故律云隨有木瓦銅鐵鳴者皆號揵椎此乃是如來信鼓衆僧號令名為集僧方法也薩婆多論云夫集僧揵椎必有常准不得互易此乃是打鐘一通某打法與懺摩同四整儀入衆法大衆聞揵椎聲已各披大衣整肅威儀雲集法堂先禮佛一拜序戒而立不得戲笑雜談南山事鈔云凡入布薩堂時應在門外褊袒右肩斂衣當心攝恭敬意而擬堂內之僧作佛想菩薩羅漢想何也以三乘法食皆同故次則徐徐進堂若在西坐者從戶外傍門西頰先舉左足定心而入若出門者還從西頰先舉右足次第而出若在東坐者反上可知不得門外交過步下參差若欲坐時先將右手按地而坐以衣自覆勿露形醜須知五法對治一心一者當懷恭敬重法尊人二者應自𢍉下如拭塵巾三者應知坐起俯仰得時四者在彼僧中不為彼雜五者不可忍事應作默然凡釋子威儀事在嚴整清潔軌行可觀此乃是無言之教堪發有情之信所以程子觀僧行而猗嗟云三代禮樂盡在於斯焉五請師升座法衆中為首者執香二引禮鳴磬如懺摩法請一具德臘師入堂脫履展大具禮佛三拜升座側立首領上香畢同迎請者展具作禮三拜起具問訊復位說戒者就位拈香三辨已左右顧云諸師請坐說已自亦跏趺六誡敕小衆法若有菩薩沙彌及受十戒并五戒者先當勗勉知事人呼云諸沙彌次第進堂向上排班已聞磬聲頂禮三拜問訊長跪合掌座上撫尺云諸沙彌諦聽人身難得戒法難逢時光易過道業難成汝等各淨身口意勤學經律論謹慎莫放逸答依教奉行座上云既能依教奉行作禮而退呼云一拜起具問訊次第出堂菩薩沙彌候誦梵網經來聽其沙彌尼入堂禮拜儀式亦如上出已維那即舉香雲蓋菩薩摩訶薩第二三聲添南無念衆齊稱已擊子遂煞下一陳完次舉云南無本師釋迦牟尼佛三稱畢即舉開律偈別解脫經難得聞經於無量俱胝劫讀誦受持亦如是如說行者更難遇出根本部七問和行籌法座上合掌從稽首禮諸佛高聲朗誦至半月半月說已撫尺問云僧集否答僧已集律云僧者從四人十人至百千人皆名為僧和合否答和合南山事鈔云大凡作法之時必須身心俱集方名和合未受具戒者出否答已出若無有來禮僧足者答云是中無有未受具戒者律云有四種具足一受具足二隨具足三護他心具足四具足守持五分律云應遣沙彌著不見不聞處以燈籠遍照恐盜聽大僧說戒受具成遮不來諸比丘說欲及清淨有否律云應來者來應與欲者與欲來然欲有四種二有緣與欲二堪能者受欲三僧中說欲四有緣轉與欲四者並須如法若犯一非具招兩過是以如來大慈凡作羯磨時若果有三寶因緣及看病等事聽彼與欲應對一堪能持欲往僧中說者言大德一心念我某甲比丘如法僧事與欲清淨一說律云若為佛法病緣應改其事安居受籌時應言與欲受籌自恣時應言與欲自恣餘一切法皆言與欲羯磨其與欲者若是後戒應對受欲者一拜長跪合掌向彼說已一叩而起若是同戒或前戒者但一拜已對立作法作已再拜僧祇律云不聽與欲者多集僧者少亦不得相等應與欲者少集僧者多亦不聽無緣與欲南山事鈔云結界滅諍二種羯磨縱有因緣不開與欲餘一切羯磨皆聽律本云與欲受欲已若未作羯磨不得出界及至戒場上亦不得明日作羯磨今日與欲違者皆突吉羅時受欲比丘有因緣起不得持欲往僧中說不知當云何佛言聽轉與餘比丘欲應如是言大德一心念我某甲比丘與衆多比丘受欲清淨彼及我身如法僧事與欲清淨一說時持欲者聞座上問已於本位上合掌高聲答云有即出衆若說和尚欲者在先只須一問訊合掌對座直立說之說已再一問訊歸位持大衆欲者對座一拜問訊長跪合掌作如是言大德僧聽衆多比丘我受彼欲清淨彼如法僧事與欲清淨一說座上云善答爾一叩而起歸本位坐律云若能憶持名姓者隨意許受多少說之如不能者但云衆多比丘與欲清淨所言欲者要也謂聞揵椎聲本要往僧中同作羯磨集其和合因有三寶因緣及看病等事故與欲也誰遺比丘尼來請教誡若無答此處無尼來請教誡若有受囑者答有答已即起座整衣至衆中先禮僧三拜長跪合掌為尼代請僧祇律云於禮僧足下加與清淨欲當如是白大德僧聽某處比丘尼僧和合僧差比丘尼某甲半月半月頂禮比丘僧足與清淨欲求請教授尼人三說一拜起具准義加云欲應至上座所如是問言大德慈濟能教授比丘尼否若答言不堪者如是乃至二十夏已來一一具問若言能者即還至座前向上合掌如是復云某上座堪能一問訊復位座上知已即白二羯磨差往然後為僧說戒其布薩誦戒與夫蓋往教尼者事法雖殊作辨同時不必更問集和說欲即當問云僧今和合何所作為答差教授比丘尼人羯磨白云大德僧聽若僧時到僧忍聽僧差某甲比丘教授比丘尼白如是大德僧聽僧差某甲比丘教授比丘尼誰諸長老忍僧差某甲比丘教授比丘尼者默然誰不忍者說僧已忍差某甲比丘教授比丘尼竟僧忍默然故是事如是持羯磨已准義如儀云其受差者理宜離位至於衆前三禮僧中上座已復位彼受囑者亦應起坐至彼受差教授比丘尼者所曲躬叉手而語教授期時白云大德慈濟能教授比丘尼僧尅何期時屈降彼處願垂示諭以便聞知候迎一說教授師酌量尅就目期報受囑者已兩相疑別各歸本座諦聽誦戒此乃是初差新教誡也若座間有曾受差者座上即問衆中誰能教授比丘尼已受差者在本位合掌各我比丘某甲堪能答已即出衆禮上座足其受囑者亦即如前詢約往期更無羯磨可作以法無重秉人無二質故此謂是有教授比丘尼人所作也若受囑人如前遍問為尼請竟無堪能者即應轉身還上座前先一問訊合掌報云我某甲遍問衆僧無有堪能者問訊歸位座上或再問衆僧無堪任者師應名彼受囑者至座前傳略教誡法彼受囑者聞已即當出位至座前向上合掌而立座上告云汝今為比丘尼請教誡者我已問僧此衆無堪能教誡人明日尼來問可否時當如我語報言昨日為尼僧中請教誡師衆無堪任者上座如律已為汝等傳宣略教誡敕爾比丘尼僧精勤行道謹慎莫放逸一說其受囑者答爾一拜復位此但明當時問請之法若欲廣知當閲教誡比丘尼正範倘有乍入伽藍來禮僧足求聽戒者尼應預告知事人其知事人先遣尼在門外立聞座上問應答此處無尼來請教誡但有禮僧足者座上云喚進來呼云諸比丘尼次第進堂問訊展大具聞磬聲頂禮三拜問訊長跪合掌座上撫尺云此准十誦略教誡法諸比丘尼諦聽今乃黑白半月布薩之期頒宣五篇聖章生善滅惡之日慶聞二部律與此是非僧不與之地受具方得序趺爾等以戒為師依戒而住精勤行道謹慎莫放逸答頂戴受持座上云既能頂戴受持作禮而退呼云一拜起具問訊佛制大僧布薩之期諸比丘尼應當請僧教誡彼處若無別界准律明制方便許聽應於比丘之後敷座而坐彼問訊已維那引至最後一行序座聽戒此乃是禮僧足求聽戒之儀式也若有請教誡行堪能者受囑人問往期竟方行籌誦戒若有受囑人請無堪能者傳宣略教誡敕已即云欲說戒者應當先行舍羅衆中已受差者出班為僧作法若已差者不必重差若未差者如是差云大德僧聽若僧時到僧忍聽僧差比丘某甲某甲為僧行舍羅白如是大德僧聽僧差比丘某甲某甲為僧行舍羅誰諸長老忍僧差比丘某甲某甲為僧行舍羅者默然誰不忍者說僧已忍差比丘某甲某甲為僧行舍羅竟僧忍默然故是事如是持若衆多者應差四人羯磨作兩番白不得僧差僧故律云應差具五德人為僧行舍羅所為不愛不恚不怖不癡知行籌求行籌也受差人先應出衆一拜復位座上復口差二人或四人收籌若有八人竝定兩班行者前立收者在後若但四人站一班行者居中收者兩邊一拜問訊歸位首者白云大德僧聽若僧時到僧忍聽我某甲比丘某甲比丘為僧行舍羅白如是若行者四人羯磨序執事作兩番白收者不必白白已齊出位如前比班向上一問訊行者執籌盤在前收者捧空盤隨後從座上起次第而行若行者四人二人從中左在分行一人各往後二行或三行起若聽戒者是稅坐應起身取籌若是地坐者應蹲踞取一莖置空盤內說欲者記明人數代取彼籌若人數多者應向行籌人云有若干人與欲其行者亦應問彼不得忘錯如上行已俱往屏處細行數之若有行別住者亦算彼數連行者收者總算記明有若干人然後收者前行行者隨後往至座前收者在前班或中立定為首收籌者高聲報云康熙某年某分第幾黑白半月布薩座中比丘若干人報已各放籌盤桌上行者仍在前班或中為首者如是復云為僧行舍羅竟向上一拜座上云善行者齊答爾拜已歸位若有行行者呼云行行的進來到已復云聞磬聲頂禮三拜又云兩邊合掌拜已長跪合掌白文三遍竟座上云衆僧已知如法行持答爾一叩而起後坐聽戒若有二三人應次第白此乃是有受囑人有堪能教誡者無堪能教誡者及有禮僧足尼來求聽戒者集僧作法如是若無受囑人及禮僧足者如前答此處無尼來請教誡已座上即問僧今和合何所作為答誦戒羯磨座上云既誦戒羯磨應當先行舍羅衆中已受差者起座為僧作法此乃是律堂誦戒常所行事如是若無請教誡尼人者集僧皆准此其未差者差及出班禮儀并單白行籌等式盡如前行行者於此白僧法亦同上八白時誦戒法律云其誦戒者應先作單白和僧已然後說戒即當合掌作如是白大德僧聽今無白月十四五日衆僧說戒若僧時到僧忍聽和合說戒白如是若有因緣欲一廣一略者座上應告大衆師言和尚說今日有某事廣大略小或云廣小略大說已撫尺云諸大德春分三月季中有閏當言四月日為一時按西域國法四月日為一時從臘月十六日至四月十五日為春分四月十六日至八月十五日為夏分八月十六日至臘月十五日為冬分無有秋分西域三時東震四季期所改者按此方國法也半月日已過依西域臘月盡誦戒則云半月日已過正月半則云一月日已過正月盡誦戒則云一月半日已過餘可准知今順此方則正月十五日誦戒為半月日已過餘例可曉其夏秋冬並如上少一夜餘有一半夜兩月半日在少一夜者西域一年分三時每一時中一定第三黑半月少一夜是正月小也若第七黑半月少一夜者是三月小也夏冬准算可知一年定少六夜此方曆數不定須照月而言逢月小誦戒則云少一夜若月大則不必言矣餘有一夜者若白日誦戒則本日一夜還在則可言餘若白日有緣至初夜分誦者應云餘有半夜若到中夜亥時誦者此句則不必言矣以布薩本日夜分盡去更無可餘故律云不得在後夜布薩是也兩月半月在者是正月十五日誦戒謂春分既過半月三月之數惟存兩月半日在矣餘可准知此不繁例老死至近佛法欲滅諸大德為得道故一心勤求精進所以者何諸佛一心勤求精進故得阿耨多羅三藐三菩提何況餘善法各趂強健時努力勤修善如何不求道安可須待老欲何樂乎是日已過命亦隨減如少水魚斯有何樂諸大德我今欲說波羅提木叉戒汝等諦聽善思念之若自知有犯者即應白懺悔不犯者默然默然者知諸大德清淨若有他問者亦如是答如是比丘在衆中乃至三問憶念有罪不懺悔者得故妄語罪故妄語者佛說障道法若彼比丘憶念有罪欲求清淨者應懺悔懺悔得安樂諸大德我已說戒經序撫尺云今問諸大德是中清淨否三問已諸大德是中清淨默然故是事如是持若廣小略大者有八處問清淨一一皆如戒序問法如是從初篇高聲朗誦至卷終即舉誦菩薩戒佛名及聞經偈已即問和集白略誦大乘若略小廣大者戒序問清淨已即如是誦四波羅夷十三僧伽婆尸沙二不定三十尼薩耆波逸提諸大德是法僧常聞半月半月九十波逸提四波羅提提舍尼衆學戒七滅諍說戒經中來撫尺云今問諸大德是中清淨否三問已諸大德是中清淨默然故是事如是持如是八處問清淨已即舉誦大乘戒佛號及開經偈廣誦大乘若二部俱廣者誦已即舉誦戒功德殊勝行等偈大衆同和回向畢其迎請者起座先禮佛一拜誦者下座亦禮佛一拜迎請者云送師傳歸寮答不勞師出已大衆齊禮佛一拜次第各散其知事人將所辨具或收舉在衣處或仍舊留在堂中遣人照看待誦大乘戒勿令遺失九續誦大乘法其日若無因緣所羈者兩乘廣誦准律明制於布薩堂誦比丘戒竟遵梵網經移座佛殿說菩薩戒若座上有佛供者則不必移就於彼處誦之以諸佛道同故若在一時誦者准小乘集自法即是大乘白法不行亦可時至鳴鐘三下或如前打法菩薩比丘聞已各披大衣整儀入堂仍如前序戒而立首領執香二引禮鳴磬如前法請一具德學菩薩比丘誦大乘戒或是前人或另請師至堂中及迎請等儀一一如前維那舉云香雲蓋菩薩摩訶薩第二第三添南無念三稱已次舉南無千華臺上盧舍那佛三稱再舉無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義撫尺問云菩薩比丘僧集否答菩薩比丘僧已集和合否答和合未受菩薩戒者出否答此中無有未受菩薩戒者若兩乘一座誦者有單受比丘戒者遣出座上問時應答已出不來諸菩薩比丘說欲及清淨有否若有答有說法如前惟加菩薩二字僧今和合何所作為答誦菩薩戒羯磨即單白和僧大德菩薩僧聽今黑白月十四五日布薩若僧時到僧忍聽和合誦菩薩戒白如是白已有菩薩沙彌呼彼一齊進堂向上作禮三拜往後序坐聽戒撫尺云諸佛子等合掌至心聽我今欲說諸佛大戒序衆集默然聽自知有罪當懺悔懺悔則安樂不懺悔罪益深無罪者默然默然故當知衆清淨諸大德諦聽佛滅度後於像法中應當尊敬波羅提木叉波羅提木叉者即是此戒持此戒者如暗遇明如貧得寶如病者得瘥如囚繫出獄如遠行者得歸當知此戒則是衆等大師若佛住世無異此也怖心難生善心難發故經云勿輕小罪以為無殃水滴雖微漸盈大器剎那造罪殃墮無間一失人身萬劫不復壯色不停猶如奔馬人命無常過於山水今日雖存明亦難保衆等各各一心勤修精進慎勿懈怠懶墮睡眠縱意夜即攝心存念三寶莫以空過徒設疲勞後生深悔衆等各各一心謹依此戒如法修行應當學歸命盧舍那十方金剛佛亦禮前論主當覺慈氏尊今說三聚戒菩薩咸共聽戒如大明燈能消長夜暗戒如珍寶鏡照法盡無餘戒如摩尼珠雨物濟貧窮離世速成佛惟惟法為最是故諸菩薩應當勤護持諸大德我已說菩薩戒序竟撫尺云今問諸大德是中清淨否三問諸大德是中清淨默然故是事如是持然後高聲朗誦句義了然若廣誦者從經題乃至八萬威儀品當廣明撫尺問清淨其四十八輕前三十逢十戒處問後十八至九戒已問誦完回向各次第去若略誦大乘者戒序問清淨已即云佛說梵網經菩薩心地品之下佛告諸佛子言有十重波羅提木叉若受菩薩戒不誦此戒者非菩薩非佛種子我亦如是誦一切菩薩已學一切菩薩當學一切菩薩今學我已略說菩薩波羅提木叉相貌應當學敬心奉持第一殺戒第二盜戒第三淫戒第四妄語戒第五沽酒戒第六說四衆過戒第七自讚毀他戒第八慳惜加毀戒第九瞋心不受悔戒第十謗三寶戒如是十戒應當學敬心奉持八萬威儀品當廣明撫尺云今問諸大德是中清淨否三問已諸大德是中清淨默然故是事如是持即云佛告諸菩薩言已說十波羅提木叉竟四十八輕今當說第一不敬師友戒第二飲酒戒第三食肉戒第四食五辛戒第五不教悔罪戒第六不供給請法戒第七懈怠不聽法戒第八背大向小戒第九不看病戒第十畜殺衆生具戒如是十戒應當學敬心奉持下六度品中廣明撫尺云今問諸大德是中清淨否三問已諸大德是中清淨默然故是事如是持即云第十一國使戒第十