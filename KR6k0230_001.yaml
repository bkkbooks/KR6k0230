身上行歸位面立引請及侍者亦各歸位首領上香已大衆一齊向上排班四禮拜歸位法和尚云至誠作觀禮拜求諸佛菩薩慈悲加被九旬之中精勤辨道無諸魔障大衆禮佛三拜問訊已上座云轉身向下問訊韋䭾和尚云至誠問訊願為擁護使我等內魔無嬈外障潛消三問訊已知事者云轉身向上頂禮和尚三拜尚云禮佛或云禮佛一拜拜已和尚云各序坐說已和尚坐下衆人歸位放下坐具脫屣上墊右手撩衣左手按後墊子上從容而下跏趺端坐以衣覆好在大衆中威儀須肅勿致招愆和尚於此處開示已乃至云今差某大德某大德行籌某大德某大德收籌我今集僧後次第作法五集白差使法僧集否答僧已集和合否和合未受具戒者出否是中無有未受具戒者不來諸比丘說欲有否持欲者答有即出位正中向上一拜長跪合掌高聲說云大德僧聽衆多比丘我受彼欲彼如法僧事與欲受籌一說尚云善答爾一叩而起問訊歸位若有第二人亦如是說僧今和合何所作為答受籌羯磨和尚云作法者白羯磨師起座向上一拜或免即止合掌白云大德僧伽聽今僧伽十六日欲作夏安居若僧伽時至聽者僧伽應許僧伽今日受籌明日安居白如是作是白已若行籌人未曾差者如布薩法中作白二羯磨差之若已受差者即齊起座作法六白行舍羅法行籌同收籌者俱起坐整儀居中向上行者前立收者後站前後兩行人少一班齊禮一拜若當時受差者和尚說過即應起坐先禮一拜歸位坐下待差過再同收籌者齊出衆如前一拜仍復本位為首行籌者合掌作單白已然後同收者起坐如前站班一問訊各人擎盤行者前行空盤隨後俱至佛前左右對立要恰好不得太近佛桌身背和尚亦不得太遠使行者手不相及第一收籌盤在班頭上立維那以籌盤放空盤上至誠禮佛三拜問訊長跪取一大籌雙手橫捧高聲報云康熙某年夏三月安居會上中天教主本師釋迦牟尼佛受第一籌說已放在桌上起立一拜持自籌盤收者以空盤放彼籌盤上禮佛三拜問訊長跪雙手收籌置空盤內再禮佛一拜然後待盤先省和尚次行大衆分其左右從上座起次第而行受者應蹲踞取籌放空盤內說欲者代收如多者報數如是行已若有沙彌結夏准律所明彼和尚或阿闍黎代取如多者應先遣在一處候待行籌已令彼進來呼云諸沙彌次第而進沙彌聞已整肅威儀至作法處向上排班復云聞磬聲頂禮三拜起具問訊引禮送彼往末行序立待行盤已方坐其籌盤俱往韋䭾前左右班立維那仍以籌盤放收籌盤上至誠三問訊如前雙手哲一大籌高聲報云康熙某年夏三月安居會上護法韋䭾尊天受最後籌說已放在桌上再一問訊然後自捧籌盤收籌者以盤放行籌盤上向韋天三問訊已雙手取籌放盤內再一問訊俱到屏處數明看行行者幾人沙彌若干連行者收者共算多少記清已收者前行至僧中前立一班行者後立一班為首收籌者高聲報云康熙某年夏三月安居會上座中比丘幾百幾十幾人沙彌若干人報已各以盤放桌上行者仍在前班收者照舊後班維那復云為僧行舍羅竟尚云善行者齊答爾一拜歸位和尚示云同居大衆已知此處今夏有若干人安居以後誦戒期中不必行籌了各人收攝身心九旬之中努力為道受籌已竟念偈回向舉云受籌功德殊勝行云云大衆念回向偈畢各人起坐二引請仍到佛前立和尚禮佛三拜已二引磬前鳴到韋天前和尚三問訊即回方丈大衆向上排班禮佛三拜轉身向下三問訊韋天已為首者云大衆到方丈頂禮和尚尚云免禮或云各回然後次第各散其知事人應遣年少比丘或求寂將所供佛位及韋天像禮拜問訊已請送原處其所辨之具亦各收藏本處畢自己方回然招提僧物體遍十方當護如眼目全在知事料理用度仔細如己物照管便無過咎適或遺落損壞者則慢惰之愆非淺鮮也第四依止安居篇七法初鳴椎集衆法安居日期大衆雖悉恐不盡知於方丈門前再懸牌一面上書安居二大字侍者埋爐敷座在方丈中其受事人於方丈門外傍設一小桌預辨紙筆等於此以便登記大衆日課及戒臘次序將二板時先對大殿主及韋䭾殿主云點燭開中門待二板鳴教打鐘三下隻安居者登殿二拈香禮佛法同居大衆聞揵椎聲各搭七衣手持坐具整肅威儀雲集殿上如事者看內外盡集已維那打磬二下二引禮鳴擊走中間兩頰門出往方丈請和尚見時應禮一拜若迎出門者則不必禮一侍者捧爐在和尚前行二引磬又在前和尚到殿門迎請者仍進傍門序左右班次立侍者捧爐直進中門放供桌上和尚從容進門維那抑磬舉云爐香作爇云云香贊鳴引磬唱和尚問訊已往右邊上至爐前再一問訊跪下拈香三辨起立問訊轉身從左邊下至居中向上禮佛三拜已香雲蓋菩薩三稱隨完和尚往佛座左邊立大衆一齊向上排班禮佛和尚云至誠禮拜懇禱諸佛願慈光加被夏中精進修行大衆禮佛三拜已二引磬先領大衆出兩傍門往韋䭾殿前站班具職事在後行從小至大二引磬仍在香爐前行引和尚至韋䭾殿前侍者捧爐進中門放供桌上傍側立維那舉韋䭾天將云云普眼菩薩摩訶薩摩訶般若波羅蜜大衆同唱和尚近爐前問訊拈香三辨再三問訊贊隨完和尚傍立大衆向上排班至誠三問訊和尚云至誠問訊仰祈護祐使我等九旬修道魔障潛消問訊已隨掩中間首領云頂禮和尚三拜或云往方丈頂禮和尚尚或免禮或云一拜此所謂依止律師求其指引一切時中所作所為修道用心之法拜已和尚云各人次序來安居首領在外大家照管和尚進方丈上座師或羯磨師一人隨進三對首安居法復二初依處不依人依處不依人者謂主法者及諸知律之上座也大凡主司律法之人為衆所依位居師承不類餘衆上座乃衆中之領袖是知法之尊宿雖不主法非依學輩是以安居問答少異謂但可依處而不依人也若不別列儀式則臨時無有定據倘自謂居尊不向他人對首白辭則不名結夏云何自恣云何算臘若自作心念安居律制有人不得所以對首安居法不可缺也惟不問依人為異故爾應如是作主法者先應安居已然後受他安居其所對之人若非弟子輩則彼此一拜已對首立云大德一心念我比丘某甲今依某僧伽藍前三月夏安居三說所對者云善主法者答爾仍彼此一拜若所對之人是弟子者惟受禮為異其上座向主法者安居答法亦爾由彼此皆明律典故不依人也若仍依人安居者便墮弟子之列矣如律所明授經阿闍黎者乃至聞一四句偈皆名師長依止阿闍黎者乃至經一宿便名依比師況九十日中豈無一法而教誡耶若不以弟子禮而待便乖律制如果能於毗尼藏通達無礙令行弟子禮者此或不伏所以如是安居則人情佛制兩不相違是所宜也若不知開遮持犯為薩羯磨者雖是上座事不同科當如後例次依處必依人依處依人者謂不知律法之上座及弟子也本律云夏中當依第五律師一誦戒序乃至三十事二誦戒序乃至九十事三廣誦戒毗尼四廣誦二部戒毗尼五廣誦毗尼若違波逸提餘時當依四種律師違者突吉羅根本律云若苾芻善明三藏證會三明已除三垢未滿五夏亦須依止帥若生年八十滿六十夏於別解脫經未曾讀誦不了其義亦須依止小者行弟子法惟除禮拜十誦律云若復受戒多歲不知比丘法者應盡形壽依止他住則知如是之人皆不可不依人安居也依止師即就坐安居者隨具一拜長跪合掌作如是白大德一心念我比丘某甲今依某僧伽藍前三月夏安居三說師云知莫放逸答受持准律意依止師應問依誰持律者答依上某下某律師師云有疑當往問答爾一叩而起問訊第二人從中間左頰門入禮拜白詞亦如上已安居者從中間右頰門出至上日課處其維那書記見彼來當問汝師是那年的戒春夏秋冬是那一期有多少臘安居一夏為一臘念佛多少禮拜持誦多少是某堂或是某單彼如上答已待書記注明方去餘安居者亦如上問答而注所言序次安居者先板堂及學戒堂次外寮首領並各行單後別住人安居其小衆文皆准上惟改沙彌二字為異若常住事冗者堂內人應讓彼先安幾位如或無緣須依次序不得取溷也若安居人多者應差首領或上座多幾處作法其所對之人雖別而文中所稱律師之名無殊內外安居竟其受事人教打鐘三下大衆普集佛殿前禮佛三拜轉身問訊韋䭾已到方丈前頂禮和尚三拜左右分班和尚警策大衆已首領者云大衆向上排班禮謝和尚三拜尚云一拜或言免禮說已各回待跪課後巡寮其後安居者隨到隨作文亦如上惟更後字為異四注明日課法次日維那同書記序日課簿寫法亦有次第先鐘板堂次學戒堂然後外寮首領及各行單並諸沙彌於每人名下記念佛持誦多少禮拜若干上寫一號或某堂或某寮序已知事人當執簿往內外及各寮對明人數以使自恣查物恐有緣出界者須來去通知以見身和同住也五序記臘次法其日課簿成已再書臘次牌先寫安居臘次四大字為題其號乃是序戒面上每人名下注明某年某期戒有夏無夏從前至後一一序竟餘一段寫後安居者然受再上行別住人及菩薩求寂五戒十戒沙彌其後安居人隨到隨上欵式如前唯要注明日期以便滿其日數勿招破夏之愆也六心念遙依法時諸比丘住處無所依人不知當云何往白世尊佛言若無所依之人應心念安居心依彼念口自陳情非謂不言也七日得往還處遙依人時至具儀心念口言我比丘某甲今依某處僧伽藍前三月夏安居遙依某甲律師三說此心念法唯前安居開聽不可以中後二法為例也七請依止師法此隨上例受戒揵度云若新受具者應恆依和尚順其教授學持毗尼時有比丘和尚命終若休道若決意出界外以無人教授故種種破戒作非威儀佛言聽有阿闍黎當求依止如和尚法阿闍黎看弟子如子想弟子看阿闍黎如父想當共相奉敬瞻視便得正法久住增益廣大也彼求依止者當具修威儀如是請云大德一心念我某甲今求大德為依止願大德與我作依止我依大德住三說彼受請已應報言可爾與汝依止汝莫放逸理應答云爾一叩而起如滿五夏不能誦戒羯磨盡形依止其執侍之法如作持明右比丘二字准義應加第五悔過修淨篇二法初親臨審戒法自恣前十餘日如先和尚成規應打念佛七於初起日前先懺悔清淨以便入念佛堂正顯淨戒為因淨土為果欲淨佛土先淨身心也此是和尚懺摩不同半月之式是日午後挂懺摩牌授事人令沙彌或年少比丘掃灑處所敷座燃燈時至鳴椎此乃是打鐘三下或五十四下亦得大衆聞已各披七衣持具肅儀至作法處內外集已一首領執香二引磬隨後再去首須四人或六人多者八人往方丈請和尚執香者走中門餘者側門而進左右序立和尚問引磬聲即出臥室至公位前迎請者向上三拜尚云一拜末後先行引磬在後執香者在和尚前至作法所若俱佛者禮三拜已升座其座一往是不供佛若論懺悔文中云若有犯者應對三寶前發露懺悔就供亦不妨首領上香畢大衆排班頂禮三拜問訊已然後分班站定次具儀呈課法其受事人將日課簿先令一人捧之然後出衆脫屣展大具至誠頂禮三拜問訊長跪手捧日課簿高聲作如是言我某甲奉和尚差將大衆日課登記簿冊今者九旬將終呈白和尚侍者接日課簿奉於座上維那起立三拜和尚應言一拜起具問訊復位此不集和由犯者自當來說罪故和尚略著日課簿并開導畢有發露者受事人應逐一記明罪相令彼各各懺悔竟方可自恣問清淨已大衆向上排班禮謝而退第六自恣解夏篇十一法初如制採草法七月十四日知事人應令沙彌或淨人採吉祥草擇去萎黃取鮮好者用以十二葉為一束若逢閏年則多一葉束數隨人多少備之或兩盤或四盤若人多者八盤籌亦如是如制備已以便取用二問緣索欲法十五日早晨接板已在殿前或於佛殿大衆對面而立上座應作如是白云大德僧聽今白月十五日衆僧集某處自恣一說問訊各回若白日自恣者在大食小食上白若有三寶等事及病緣者聽與欲應差一堪能持欲者界內各處受之如界大夜中要索欲者應差一二人為伴毗尼母論云有五種與欲自恣法一者今日僧自恣我與僧自恣二者我白自恣三者為我故自恣四者若日不能言者手作說相亦得與自恣五者語雖不了亦是與自恣是名五種與欲自恣法此是第一種與欲法應對受者作如是言大德一心念我比丘某甲如法僧事與欲自恣一說律云若佛法病緣改事而說如是各處受已仍舊回堂三敷座請師法其知事人令年少比丘或沙彌於作法所鋪設衆具本律云當於露地自恣授事人應觀大衆多少以便取墊子敷衆僧座仍於正中上面供釋迦佛牌位下面朝上左隅供韋䭾位並須香花羅列燈燭煒煌左右敷衆僧座上面左隅敷和尚位於中設二低桌將草盤置前低桌上以鮮花覆之將籌盤放後低桌上亦以鮮花覆之敷設已畢索欲者回鳴椎集僧此如誦戒法打鐘大衆聞知各披七衣手持坐具整肅威儀至作法處禮佛一拜序戒就位立定授事人瞻視大衆齊已首領執香二引磬隨後再去戒長者四人或六八人往方丈請和尚執香者走中門餘人傍進和尚出臥室至公位前迎請者頂禮三拜或一拜已末後前行至作法處執香者在下班尾上立迎請者歸位二引磬站在佛前和尚至先一問訊跪下拈香已起身再問訊轉下居中向上禮佛三拜侍者站和尚後拜已二引磬領和尚至韋䭾前和尚到先一問訊拈香三辨再三問訊和尚轉身上走歸位而立引請侍者各歸本位首者上香已大衆向上排班至誠禮佛三拜首領者云轉身向下問訊韋䭾三問訊復云轉身向上頂禮和尚三拜尚云禮佛或云禮佛一拜拜已和尚坐下云各人序坐人各脫屣上墊跏趺四集僧作辨法大衆坐已和尚於此開示畢先作前方便即問云僧集否答僧已集和合否和合未受具戒者出否答是中無有未受具戒者不來諸比丘說欲有否持欲者於座上合掌答云有即起座居中向上一拜長跪合掌白云大德僧聽衆多比丘我受彼欲彼如法僧事與欲自恣一說尚云善答爾一叩而起歸位坐下和尚問云誰遣比丘尼來請見聞疑三事自恣若無者答此處無尼來請見聞疑三事自恣若有乍入伽藍欲隨喜作法者當如是答此處無尼來請自恣但有禮僧足者尚云喚將來知事者呼諸比丘尼來尼聞呼名手持坐具肅儀而進維那呼云一齊向上排班展大具聞磬聲頂禮三拜問訊長跪合掌和尚略宣教誡汝等比丘尼諦聽今乃九旬夏罷之期說罪除愆之際五篇禁制八敬森嚴凡比丘尼應當依隨大僧安居半月乞求教誡歲終比丘隨意應須來請自恣方不負受具登壇阿難請度不然則乖違佛制徒有其名爾等當束斂身心精修善法以戒為師謹慎莫放逸答頂戴受持呼云一拜而起後邊去序坐隨喜略教誡法律本文缺臨事必須理不容默故録於此斯乃是有尼來禮僧足不請自恣人如是而作也若有尼來請自恣者受囑人問已於本座上合掌高聲答云有即起坐整儀至僧中先禮僧足三拜長跪合掌為尼代請當作是白大德僧聽某處比丘尼僧和合僧差比丘尼某甲頂禮比丘僧足來請見聞疑三事自恣三說一叩而起和尚云喚將來其授事人喚尼至僧中展大具禮僧足三拜長跪合掌曲身低頭白云比丘尼僧夏安居竟比丘僧夏安居竟比丘尼僧說三事自恣見聞疑罪大德僧慈愍故語我我若見罪當如法懺悔三說良久大僧上座應云徒衆上下各並默然者實由尼等內勤三業外無三事故不見犯雖然上座有敕敕諸尼衆如法自恣謹慎莫放逸尼答依教奉行此乃律文如是若欲語詞圓滿而顯足者尼當如是白云比丘僧夏安居竟某處比丘尼僧夏安居竟差我比丘尼某甲為比丘尼僧故說三事自恣見聞疑罪大德僧慈愍故語我我等若見罪當如法懺悔三說良久和尚敕云徒衆上下各並默然者實由尼等內勤三業外無三事故不見犯雖然如是汝傳教敕敕諸尼衆如法自恣謹慎莫放逸尼答依教奉行即禮謝而退還至本寺鳴椎集尼僧已當依大僧教敕宣示一切儀式俱如教誡正範中行宣已如法自恣待尼出已復問云僧今和合何所作為答自恣羯磨尚云今差某大德某大德行籌某大德某大德收籌羯磨者作法此中儀式俱如受籌法行故不復出盤到佛座前行者禮拜竟取一大籌高聲報云康熙某年自恣會上娑婆教主本師釋迦牟尼佛受第一籌大衆行已至韋䭾前亦如前式高聲報云康熙某年自恣會上護法韋馱尊天受最後籌收籌報數盡如前作康熙某年自恣會上座中比丘幾百幾十幾人沙彌幾人報已以盤俱放桌上為首行者高聲復云為僧行舍羅竟向上一拜尚云善行者齊答爾問訊歸位五差受自恣法十誦五分二律皆言並差二人以上若衆止五人應前後單差若六人以上者一時雙牒而作羯磨若衆僧多欲差四人或六人受自恣者應兩番作白彼此互差一羯磨差二人或三人不得差四人以滿僧數故和尚云今差某大德某大德作受自恣人羯磨者次第作白二五德人聞上說已即應出衆向上一拜各歸本位首者白云大德僧聽若僧時到僧忍聽僧差比丘某甲某甲作受自恣人白如是大德僧聽僧差比丘某甲某甲作受自恣人誰諸長老忍僧差比丘某甲某甲作受自恣人者默然誰不忍者說僧已忍差比丘某甲某甲作受自恣人竟僧忍默然故是事如是持六行草敷坐法差已二五德人起座一拜各捧草盤如前而立高聲齊說云吉祥長者施軟草如來受已成正覺我等比丘學佛慧坐草自恣淨三業三說從和尚及上座次第散之大衆取具一齊起立待行草者至手接草打開鋪在墊子上口誦此偈坐具展開敷草坐之其行草人到自己位次亦行一束在墊子上各各行已放盤桌上照舊排班向上一拜為首者云為僧行草竟尚云善齊答爾各歸本位亦如上鋪草念偈已敷具而坐七白僧隨意法和尚云說戒自恣應在後作羯磨者先作單白牒事告僧然後起座為衆自恣律中佛言僧自恣時應知比丘有來者有不來者聽先作白已然後自恣作法者合掌白云大德僧聽今日衆僧自恣若僧時到僧忍聽僧和合自恣白如是白已應起復禮一拜若有過人三根實者先應作舉不可懺者驅擯不可驅者當停自恣勿致破僧無三根舉者反治可懺者應懺已自恣若無事者受差人即起俱應暫立第一受自恣人先至和尚座前一拜和尚問拜已彼此長跪合掌和尚自恣云大德衆僧今日自恣我比丘某甲亦自恣若有見聞疑罪願大德哀愍故語我我若見罪當如法懺悔三說彼云善尚答爾一叩而起然後從上座起次第自恣其二五德人准僧祇律各輪至本座位次即來展轉自恣再去不得待僧竟若五德人是上座者自恣人一拜長跪合掌自恣已一叩而起問訊坐下若五德人是同戒或是後戒者不得受禮應彼此同拜對跪合掌作法已一叩而起若第一座人作法第二座人即起俟之如是從前至後一一自恣竟其知事人呼云諸沙彌次第而進到已復云聞磬聲頂禮三拜起具問訊其知事人應令沙彌往最後一行次第而立五德者如前先行草沙彌亦如上受草誦偈敷具坐已五德人至沙彌處一一自恣其文准上惟改比丘為沙彌說之如是作法已其五德者齊往僧中照舊立定為首者云僧一心自恣竟尚云善齊答爾一拜歸位八遵制結示法和尚云今日如法如律自恣已竟名為解夏雖然如是律制猶嚴准安居揵度云四月十六安居至七月十五日夜分盡訖方明解夏已竟若明相未出夜分未盡更當精進若出界去及少日課者仍名破安居如律所明不得衣施各人照舊加工用行勿得放逸自恣已竟念偈同向自恣功德殊勝行云云大衆同音回向已一齊起座收具二引磬仍至佛座前站和尚禮佛三拜引磬往韋䭾前立和尚三問訊韋䭾已歸方丈大衆亦禮佛三拜及問訊韋䭾已首者云大衆到方丈頂禮和尚尚云免禮大衆各散其授事人收舉衆具已方回九難緣略說法佛言若有八難事來及餘緣起不得各各三說自恣者應略自恣但對首有二略單白已有三略若難事可得廣說者便廣說若再說若一說若可作而不作者應如法治衆法對首第一略准自恣揵度云若有難事不違不得廣說三語者應作白已當再說自恣再說者文說兩遍也羯磨者作如是白大德僧聽若僧時到僧忍聽僧今再說自恣白如是第二略佛言若難事再說亦不得者應作白已一說自恣如是白云大德僧聽若僧時到僧忍聽僧今一說自恣白如是單白已有三略佛言若難事迫近一說亦不得者應作白已各共三語自恣白云大德僧聽若僧時到僧忍聽僧今各共三語自恣白如是此由難事急迫大衆不得人各對首一說又開衆僧普向五德人彼此互跪准前僧法一齊同聲三說自恣此復略其衆法對首再說一說故云單白已有三略也十展轉憶念法若界內只有四人者不得受第五人欲應展轉對首自恣時至共集一處禮佛三拜先問集單白已一人禮餘三人一拜分上中下座或立或跪作如是白三大德憶念今日衆僧自恣我比丘某甲清淨三說彼齊云善答爾一拜而起餘三人次第作白亦如是若本三人者應云二大德憶念若本二人相對者去其二字但云大德憶念餘詞無異十一一人心念法佛言若一人獨居者至自恣日如前一一辦具已若無客比丘來者應具威儀長跪合掌心念口言今日衆僧自恣我比丘某甲清淨三說獨住比丘若欲餘行者應收舉衆具藏著已待十六日明相出方去第七德衣授受篇十法初敷設集僧法比丘三月安居七月十五日滿作自恣已於十六日寅卯時應懸牌一面上書今日受迦絺那衣七大字其受事人應令年少比丘或沙彌掃灑淨處上而正中敷和尚座左右敷衆僧座於中設一低桌取一淨盤并袱以功德衣放好盤中取解花散覆置於低桌上一一完備已待受欲者回堂然後鳴椎此如誦戒法打鐘一通大衆聞已各彼七衣手持坐具肅儀而趨至作法所序戒就位而立其受事人看內外大衆集已鳴二引磬此不執香上座去四人或六人八人隨後往方丈請和尚到已左右序立和尚聞引磬聲即出臥室至公位前迎請者隨具三拜或一拜已末後先行至作法處就座而立大衆向上排班頂禮三拜各歸本位和尚云各人序坐和尚開示畢問云二問答和白法僧集否答僧已集和合否和合未受具戒者出否是中無有未受具戒者不來諸比丘說欲有否持欲者答有即起居中向上一拜問訊長跪合掌白云大德僧聽衆多比丘我受彼欲彼如法僧事與欲羯磨尚云善答爾一拜而起問訊歸位僧今和合何所作為答受迦絺那衣羯磨和尚云羯磨者先作單白牒事告僧次白二差人然後羯磨付衣作法者起座向上一拜或免即止歸位白云大德僧聽今日衆僧受功德衣若僧時到僧忍聽衆僧和合受功德衣白如是三差人持衣法十誦律云有五種比丘不得作持迦絺那衣人一無歲二破安居三後安居四滅𢷤五別住人若非此五種人當作是白和尚云今差某大德為僧守功德衣守衣比丘聞上說已即應起坐居中向上展具頂禮三拜起具問訊然後歸本位坐大德僧聽若僧時到僧忍聽僧差某甲比丘為僧持功德衣白如是大德僧聽僧差某甲比丘為僧持功德衣誰諸長老忍僧差某甲比丘為僧持功德衣者默然誰不忍者說僧已忍差某甲比丘為僧持功德衣竟僧忍默然故是事如是持四羯磨付託法作法者即起身將功德衣請在手中歸本位坐羯磨付衣與彼受差者如是白云大德僧聽此住處僧得可分衣現前僧應分若僧時到僧忍聽僧今持此衣典某甲比丘此比丘當持此衣為僧受作功德衣於此住處持白如是大德僧聽此住處僧得可分衣現前僧應分僧今持此衣典某甲比丘此比丘當持此衣為僧受作功德衣於此住處持誰諸長老忍僧持此衣與某甲比丘受作功德衣者默然誰不忍者說僧已忍與某甲比丘衣竟僧忍默然故是事如是持作法者白羯磨已即起坐付功德衣與受差者守衣人亦即起身迎上接衣放於桌上居中向上頂禮一拜問訊已然後雙手持衣往最下側立作如是言五張衣示衆法此衣如法作成其衣財名體等義和尚已為大衆開示過了我某甲此時但張與大衆看就是根本律中名張羯恥那衣張者開示也此義文略今准會正云衆僧如法羯磨與衣已持衣者應兩手捉衣先開張示令大衆皆要得知此衣相是五條十隔四周安緣也說已持衣比丘即以兩手張衣戒邊向外從右邊從容而上面向大衆側身行之口中恆作如是言此衣五條十隔四周有緣如是至左邊下一周行已將衣摺起雙手捧之向上對衆受云六為僧授受法此衣衆僧當受作功德衣三說此衣衆僧今受作功德衣三說此衣衆僧已受作功德衣三說至第三遍加一竟字說已雙手捧衣巡行衆僧座次先至第一座其受衣者即應蹲踞雙手提衣邊作如是言其受者已善受此中所有功德名稱屬我一說持衣者言善受者答爾如是第一座受已至第二座乃至最下座次第巡受左一行受已至右一行二三四乃至若干行亦如是受其受者各各儀式文詞並皆如上善見律云有三種人不得受迦絺那衣一者破安居人二者後安居人三者異住處人如若有者但令集和隨喜制無受衣之法若衣至座前應云我是後安居持衣者即越之大衆逐一受已仍至中間以衣放桌上合掌復云為僧受功德衣竟尚云善答爾向上一拜持衣歸位坐和尚復開示五利賞德及人事久衣令其開解以便出入衛防乃至云受衣已竟念偈回向舉云受衣功德殊勝行云云回向已大衆起座禮謝各散迎請者亦不必送至晚巡寮其奉差者持此衣回堂為衆畜自身邊期滿日捨律攝云持功德衣苾芻不得出界外經宿若經宿者衆僧失功德衣也七四人受衣法若一界內惟有四比丘者既無餘衆可差作法自不同前亦無有欲可說應如是受其集僧問和如常所行亦應答云受迦絺那衣羯磨作法者應如是白大德僧聽今日衆僧受功德衣若僧時到僧忍聽衆僧和合受功德衣白如是白已上座問云誰能為衆持功德衣答我比丘某甲堪能作法者白餘二人云二大德憶念此住處僧得可分衣現前僧應分我等今持此衣與比丘某甲此比丘當持此衣為衆受作功德衣於此住處持二人答云可爾說已為衆持衣者應起身禮上座足一拜其張衣受衣等儀式書同前捨衣亦爾八三人受衣法自恣惟三比丘者有衣須受既不滿數僧法俱不應作但將衣先置公所三人齊集已一人白云今日我等受功德衣誰能為衆持功德衣若能者答云我比丘某甲堪能作法者應白餘一人云大德憶念此住處比丘得可分衣現前衆應分我等今持此衣與比丘某甲此比丘當持此衣為我等受作功德衣於此住處持餘一人應答云可爾衆中若有上座者持衣人應禮一拜若無則已即取衣展開令餘二人看已摺起雙手捧云此衣我等當受作功德衣三說此衣我等今受作功德衣三說此衣我等已受作功德衣三說第三句加一竟字其詣第一位受及所對語言皆如僧法二人受已仍持至中間報云我等受功德衣竟第一人云善答爾須以衣畜自身邊待臘月十五日出九對首受衣法若但二人受衣者應先議定一人持衣臨時二人同一拜已餘一人向持衣者云今日我等受功德衣願大德將此可分衣持作功德衣於此住處持彼應答云可爾其持衣張受等詞與前三人中受法無異十獨受德衣法若獨住比丘受衣准僧祗律云作衣成已應其修威儀心念口言我比丘某甲受此迦絺那衣如是三受其捨文但易受為捨餘詞無異第八出衣遮利篇七法初淨堂集衆法臘月十五乃冬分時盡之日是比丘出衣之期其早晨應懸牌一面上書今日出迦絺那衣七大字差人界內索欲授事人應令年少比丘灑掃淨處待受欲人回堂已鳴椎打鐘三下大衆聞揵椎聲肅儀而集作法之處其授事人看大衆集已往方丈請和尚至法堂首領者云大衆向上頂禮和尚尚云免禮或云一拜二呈衣復上法其守衣人出位居中向上展大具頂禮三拜問訊跪下若是上座不必跪其功德衣應取一淨盤並袱以衣放彼盤中先令一人捧之在傍俟候待拜已傳與守衣人手中捧之高聲復云我某甲奉和尚差為僧守功德衣今者五月已滿呈白和尚尚云守衣有功大衆均霑利益接上來即隨便一人接衣至白羯磨者後立守衣人三拜或一拜起具問訊班立三問答所成法僧集否答僧已集和合否和合未受具戒者出否是中無有未受具戒者不來諸比丘說欲有否持欲者答有即出班居中向上一拜問訊長跪合掌說云大德僧聽衆多比丘我受彼欲彼如法僧事與欲羯磨尚云善答爾一叩而起問訊歸位僧今和合何所作為答出迦絺那衣羯磨和尚云羯磨者作法四單白出衣法其作法者聞已即出位向上一拜若免即止然後持衣作如是白大德僧聽今日衆僧出功德衣若僧時到僧忍聽僧今和合出功德衣白如是白已侍者接衣於和尚傍立羯磨者仍應向尚一拜或免止之五嚴禁五事法和尚開示出衣緣起及遮止五利並警策大衆精進修持已復云六稱量施衣法善見律中問僧持迦絺那衣與誰應與衣壞者若壞衣比丘多壞衣比丘中老者與若無老者臘數大者與但不得與慳貪者今此衆中誰人衣破若有出衆求者和尚復問大衆云汝等稱量此人可是真正淡泊者否若大衆齊答云此人當與者即便與之彼比丘亦應出衆普禮三拜已方持衣去若無求者或不應與者持回方丈或作桌衣或為經袱或改出長短田相存於丈室以俟成就衣破比丘受持或在常住用力者與之若三衣中或安陀會或鬱多羅僧或僧伽黎隨一頂受作功德衣者則不必改如上作已知事人云大衆頂禮和尚尚云免禮人各次序而散七三二獨捨法若界中但三比丘或二比丘居者至臘月十五日應集一處守衣比丘雙手捧衣作如是言我比丘某甲守功德衣竟今日當出一說以後五事皆不得開第九捨受衣藥篇衣藥受淨時逾招愆故編時事法有十三初正捨三衣法本律云有疑當捨已更受不出捨文僧祇律云有緣須捨者具修威儀加云正者對權而言具修威儀者若欲捨時持衣至一知律師僧所前人或是下座或是弟子者應一拜已對立而說若是上座及前戒者一拜已問訊長跪雙手捧衣如是捨言大德一心念我比丘某甲此僧伽黎是我三衣數先受持今捨所對者云善答爾一說便止以衣遞與前人手中作禮一拜已持衣而去或說淨畜或成就人不得過十日其下二衣乃至尼五衣等捨法亦爾但更其衣名餘文如上五分律云所受三衣不捨便受餘衣以先衣淨施及施人得名更受亦名淨施施人但不捨得突吉羅罪其受時必三說捨時但一說者何也以受衣之時敬心重故必須三說捨衣之時棄心輕故只須一說便成捨也二正受三衣法授受之人禮儀如上若作法時手持五衣如是受言大德一心念我某甲比丘此安陀會五條衣受一長一短割截衣持三說所對者云如法受持答爾受者即起置衣桌上禮謝前人然後持去如三衣問受者先搭五衣長跪手捧先衣如是受言大德一心念我某甲比丘此鬱多羅僧七條衣受兩長一短割截衣持三說所對者云如法受持答爾以七衣置桌上一叩再手捧大衣如是說言大德一心念我某甲比丘此僧伽黎二十五條衣受四長一短割截衣持三說所對者云如法受持答爾禮謝已持衣去三權受從衣法暫時應法曰權從者隨也如律所明若三衣中遇緣隨缺一衣者聽有長衣權受持應法免離衣過須如長衣守持但從其名不從其相惟聽隨身不聽披著今擇取一法餘則可曉只如安陀會有缺者僧伽黎有長則推受持其儀式如前應持衣至一清淨如法比丘所作如是言大德一心念我某甲比丘此安陀會二十五條衣受四長一短割截衣持三說所對者言如法受持答爾禮儀如上乃至九條七條三二長短攝葉褋葉及與縵作隨時所說若缺餘二衣三衣互受准上可知至於五衣有二十種從法七衣有二十二種大衣有六種詳閲作持則可知矣四捨尼師壇法十誦律云尼師壇不應受單者離宿得突吉羅摩得勒伽云若離宿不須捨但懺罪律諭制受闕文准義應加既有受法亦必有捨若尼師壇隨身坐臥年久破壞脫落欲作新者應先捨後受如前儀式持具對一比丘捨云大德一心念我比丘某甲此尼師壇先受持今捨一說所對者言善答爾一拜而却五受尼師壇法大德一心念我比丘某甲此尼師壇應量作今受持三說所對者云善答爾儀式如前六捨鉢多羅法大德一心念我比丘某甲此鉢多羅先受持今捨一說七受鉢多羅法律無受法准十誦云若捨過受新應如是說大德一心念我比丘某甲此鉢多羅應量受常用故三說其捨受等儀盡如前例八證受三藥法初非時藥儀式如前證者據也根本部云其不濾者為時其淨濾者為非時仍須以水滴之為淨律中有受無詞准以義加受法云大德一心念我比丘某甲今為渴病因緣此是蜜漿為欲經非時服故今於大德邊受三說所對者云善答爾拜已持去餘漿准此若無渴病受飲犯罪二七日藥佛言有酥油生酥蜜石蜜世人所識有病因緣聽時非時服按律攝云受七日藥正服之時應告同梵行者云我已一日服藥訖餘有六日在乃至七日准知若為好容儀或著滋味或求肥盛詐僞心服食諸藥皆惡作罪服時應如是受云大德一心念我比丘某甲今為熱病因緣此酥七日藥為欲經宿服故今於大德邊受三說所對者云善答爾拜已持去如是受已齊七日服之若過犯捨墮三盡形壽藥佛言一切鹹苦酢辛不任食者有病因緣聽盡形服乃至灰土大小便等若服時亦應受當自手持口對前人受云大德一心念我比丘某甲今為寒病因緣此薑椒盡形壽藥為欲共宿長服故今於大德邊受三說所對者云善答爾作禮已持藥而去若有餘藥或白水散丸湯膏煎等但不任為食者牒名加法准上如不受而服者犯失法突吉羅罪九請淨施主法佛言長衣長如來八指佛一指二寸廣四指應淨施不者犯墮薩婆多論云應求持戒多聞者而作施主衣揵度云有二種淨法一者真實淨二者展轉淨真實淨者是淨施與人也展轉淨者乃作方便法也又薩婆多論云九十六種無淨施法佛大慈方便力故教令淨施令諸弟子得畜長財而不犯戒非真實淨也若欲請時應具修威儀先禮足已長跪合掌作如是說大德一心念我比丘某甲今請大德為衣藥鉢展轉淨施主願大德為我作衣藥鉢展轉淨施主慈愍故三說彼云善答爾作禮而去十衣藥說淨法善見律云若衣物衆多段段說之欲總說者並縛相著加重法牒之真實淨施用須聞主展轉淨施則不須也凡欲說淨時當至一如法持戒比丘所作禮一拜彼若是同輩及後戒者對立而說若是上座及前戒者拜已長跪合掌手持長衣作如是說大德一心念此是我某甲長衣如未成衣應言長衣財未作淨今為淨故施與大德為展轉淨故彼受者言長老一心念汝有是長衣未作淨為淨故施與我我今受之受者接彼衣在手中言汝施與誰彼當言施與某甲受淨者言長老一心念汝有是長衣未作淨為淨故與我我已受之汝與某甲是衣某甲已有汝為某甲故善護持著用隨因緣彼答云爾一說作禮一拜持衣而去其長鉢殘藥文並同准十一尼受二衣法凡比丘尼受捨等儀准比丘法亦分上中下座一僧祇支大姊一心念我比丘尼某甲此僧祗支如法作我受持三說若捨時但云此僧祗支或云覆肩衣先受持今捨餘文如上二覆肩衣大姊一心念我比丘尼某甲此覆肩衣如法作我受持三說其式叉摩那並沙彌尼受四衣法亦准此十二勤䇿捨衣法其儀式皆同比丘律本雖不出受法今准十誦及五分律中持衣於上座前應如法三說若捨一說大德一心念我沙彌某甲此縵安陀會今捨一說比丘云善答爾十三勤策受衣法大德一心念我沙彌某甲此縵安陀會受持三說比丘云善答爾禮足已畢持衣而去第十心念捨受篇八法初念捨三衣法五分云獨住比丘三衣中須有換易者具修威儀心生捨衣之念手捧所受之衣應如是說我比丘某甲此僧伽黎若干條今捨一說二念受三衣法然後受所長之衣如前威儀加法云我比丘某甲此僧伽黎若干條受三說餘二衣等受捨亦爾三念捨坐具法儀式如前我比丘某甲此尼師壇先受持今捨一說四念受坐具法我比丘某甲此尼師壇應量作今受持三說五念捨應器法善見律云若無人時獨受持鉢即准上文先捨後受儀式如前應如是說我比丘某甲此鉢多羅先受持今捨一說六念受應器法我比丘某甲此鉢多羅應量受常用故三說七念受三藥法若獨住比丘有緣欲服三種藥者准義加法亦應心念受之則無缺法之咎一非時藥儀式如前我比丘某甲今為渴病因緣此是蜜漿為欲經非時服故今受三說二七日藥我比丘某甲今為熱病因緣此酥七日藥為欲經宿服故今受三說三盡形壽藥我比丘某甲今為病因緣此薑椒盡形壽藥為欲共宿長服故今受三說八長衣說淨法准此心念唯聽獨住比丘由無同侶離喧遠衆故聽於出家二大三小衆中但有親厚知識者任其稱名與取若非獨住比丘必依正說淨法行持也五分云應偏袒右肩胡跪手捉衣心念口言我比丘某甲此長衣淨施與某甲於五衆中隨意與之隨彼取用得至十一日復如前威儀言我某甲此長衣從某甲取還得至十日復如初言我某甲此長衣淨施與某甲隨彼取用如是捨故受新十日一易僧祗律云施主若死等不得過十日更覓施主說淨音釋南山宗主宣祖初居終南山與發異尼建立綱宗故稱為南山宗焉澄照聖師諱道宣字實相唐懿宗朝諡號澄照大師尊稱戒德故曰聖托音職取也析金杖析音昔分也金喻律意式微衰替也核實也典誥作述篇章先型遺範也慫慂上音縱下音勇勸請義瀛渤上音盈下音孛大海貌溯音素逆流而上也懺摩篇梵語謂天竺人語同梵天故白半月從初一至十五表智德漸圓故黑半月從十六至三十表斷德漸盡故羯磨此翻為事又翻所作謂依事所作故問訊訊者言也意取發言慰問以伸誠敬故今時但有合掌低頭而口不言雖無實義理亦無失長跪根本羯磨云雙膝著地也合掌于本左右合而為一表䖍敬之至也沙彌耶舍傳譯為勞之小者以修道為勞也及翻息慈謂息惡行慈也奘法師云室利摩拏路迦此翻勤䇿謂勤修策勵斷煩惱而趣涅盤也義淨律師云室羅末尼譯為求寂謂欲求趣涅盤圓寂之處而永離諸患也五欲色聲香味觸也謂此五種能生行人須欲之心故禁戒禁制也戒止也謂能制止所起之惡故弟子梵名室灑南山云學在我後名弟解從師生名子忖度也釋子佛言四姓出家無復本姓但言釋子性業性實也縱不受佛戒本來有罪故不現前羯磨謂擯沙彌不得使其現前突吉羅突者惡也吉羅者作也說也身犯名惡作口犯名惡說母論云犯身口律儀故遮業因犯方遮僧集凡作羯磨先問僧集者恐犯別衆故大德雜事云年少苾芻應稱老者為大德老喚少者為具壽又稱前戒應言大德某師稱後戒云某大德五篇謂四棄十三僧殘百二十波逸提四可呵衆學法也五分法身戒定慧解脫解脫知見清淨潔白也梵名梵摩或翻為空大論云以人畏空但言清淨維那梵語羯磨陀那寄歸傳云華梵兼舉也維是綱維華言也那是梵語刪去羯磨陀三字譯為事知又翻次第亦云悅衆蓋謂知僧事之次第而悅其衆也書記謂執掌翰墨司記文詞故普賢擕李云行彌法界曰普位鄰極聖曰賢菩薩此云覺有情秦言大道心衆生南無此云歸依釋迦牟尼此云能仁寂默文殊師利此云妙德唐言妙吉祥彌勒姓也此云慈氏字阿逸多或云阿耆多此翻無能勝謂慈無能勝也方丈唐高宗時王元䇿使西域至毗耶城見維摩石室以手板縱橫量之各得十笏故曰方丈脫屣音徙履也白二一白一羯磨也白四一白三羯磨也對首謂對面同秉法也心念謂發心念境口自傳情非謂不言而名秉法也身戒比丘戒也心戒菩薩戒也正法正法千年人根淳厚聞法即證像法像法千年雖似正法聞法者多修證者少末法末法萬年鬪諍堅固邪見增長無修無證也梵網本源自性清淨故稱為梵慧命遍傳塵剎故稱為網布薩篇揵度此云法聚以氣類相從之法聚為一段也羅閲城即王舍城應法師云是摩伽陀國之都城也外道謂心遊理外故月八日是日四天王差使巡察人間善惡二十三日間此十四日是日四王太子巡察人間善惡二十九日同此十五日是日四天王自下人間巡察善惡三十日同此瓶沙王梵名頻婆娑羅此云影勝未生怨之父也三時聚會三時者如前月八十四十五也波羅提木叉律云戒也亦名毗尼律攝翻別解脫又云保解脫世尊謂竭煩惱海斷生死流世出世間共所尊重故佛秦言知者婆沙論云覺者妙樂記云對迷名知對愚說覺睡眠意識惛熟曰睡五情放逸曰眠上座梵名悉替那五分律中佛言上更無人名上座母論云從無夏至九夏名下座十夏至十九名中座二十夏至四十方名上座知事人亦名受事人謂受僧差使知僧事故阿羅漢此云無生亦名應供或翻殺賊謂已殺煩惱賊故三乘聲聞緣覺菩薩也程子諱皓字明道乃宋時大儒猗嗟歎辭三代禮樂謂夏時起商時盛至周全也德臘德者得也臘者除也謂除舊接新故安居一夏方算一臘謂比丘出俗不以俗年為計乃數夏臘稱尊故俱胝此云百億稽首稽留也謂下首至地停留少久方起故和合梵語僧伽此云和合衆由衆僧和合佛法方興故比丘此云除饉或翻淨命又名破煩惱某甲某者誰也乘也甲者名也謂誰秉其法即當牒其名也教誡謂教住正念遮無利益故教授謂教住正知與有利益故長老謂年高臘長學解廣深故僧伽藍譯為衆園如世園圃能生果蔬佛弟子所居能生道芽聖果故蹲踞上音存謂尻不至地也即是雙足履地兩膝皆竪故阿耨多羅三藐三菩提華言無上正遍知覺波羅夷此翻他勝罪律攝云極惡義多論云名墮不如意處僧祗律名退沒墮落律本中名不共住僧伽婆尸沙善見律云僧殘罪謂僧中有殘應依僧伽而治其罪故律攝云衆教罪由奉衆教罪方除滅也不定法律攝云此罪體無定相故尼薩耆翻為捨波逸提翻為墮前三十名捨墮後九十名單墮波羅提提舍尼義翻向彼悔或言應說法衆學法謂此戒難持易犯時刻應當學故七滅諍謂此七種毗尼能滅四種諍故千華臺華含法界表戒含諸法也人中花有十餘葉葉瓣也天花有百餘葉佛菩薩花有千餘葉此但表戒度故臺即座也盧舍那此云淨滿諸患都盡故稱為淨衆德悉圓故稱為滿又翻光明遍照如來如過去諸佛行六波羅蜜得諸法如相來至佛道今佛亦如是道來故名如來歸命衆生貪著有三一財物二身根三性命三者之中性命最切今行人作法曰歸命者捨其最切也金剛佛謂能摧諸煩惱名為金剛體是無漏表法身也金取不變為義剛取斷截為義謂金剛光明寶戒照見五蘊諸法皆空截斷一切有漏惑業十方如來同證斯體故三聚謂攝律儀戒攝善法戒饒益有情戒摩尼珠此云離垢天台云摩尼者如意也從龍王腦生又云出佛舍利心地品萬法之所集起故稱為心凡聖之所依持故稱為地品者類也五辛一葱二薤三韭四蒜五興渠九旬十日曰旬年少比丘初受具者受籌篇和尚此云力生謂由師之力生我戒身故阿闍黎此云軌範謂能軌範後學故娑婆或云索訶此翻忍土韋䭾華言智論姓韋諱琨即南方天王八將之一臣修童真業不受天欲面受佛囑護法安僧回向回因向果回事向理回受籌功德向諸衆生也安居篇安居南山云形心攝靜曰安要期住此曰居毗尼此云善治亦云謂伏苾芻具含五義一體性柔軟二引蔓旁布三馨香遠徹四能止疼痛五不背日光三明天眼明宿命明漏盡明三垢貪嗔癡警䇿謂警諸懈者䇿進後昆自恣篇自恣謂自己有過自不知非恣他舉明令改過從新也衆僧華梵雙舉報恩云出三界之福田也阿難請度此云度喜會正記云佛成道十四年中姨每求度佛不聽許阿難三請佛令傳宣八敬彼答能持方聽出家八敬法一百臘尼見新戒比丘當禮拜問訊二不得罵謗比丘三不得舉比丘過四式叉摩那學戒年滿應從大僧受具五尼犯僧殘應在三部僧中行半月摩那埵六半月布薩當於僧中求教誡人七不應在無比丘處安居八安居竟當於僧中求教授人二五德人一舉罪五德謂不愛恚怖癡知自恣未自恣二自恣五德謂知時如實柔軟利益慈心吉祥梵名始尸本行經云菩薩將成佛時帝釋化為傭力者刈草以奉長者謂年耆德艾事長於人乃有德之稱正覺言法無差曰正破生死夢曰覺三業身口意三事見聞疑三根根有能生之義謂於見聞中隨一生疑而起其事故名曰根迦絺那衣此云功德衣亦名慶賞衣五衣有二十種從法謂大衣九品聽割截作褋葉作共十八七衣亦聽割截褋葉兩種作法是為二十也七衣有二十二種從法謂大衣十八五衣四種謂割截攝葉褋葉縵作共為二十二種也大衣有六種從法謂五衣四種作法七衣二種作法是為六種也
