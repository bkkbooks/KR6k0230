front:
  text: 序羯磨者乃如來金口親宣之法也所謂僧法對首心念而已總則唯此三門廣有一百八十四種念其力則能浣染為淨詳其功則能成濟事緣後之行者惟須秉白如法即合佛制其或顛倒錯脫便名非法也律云正法住滅在于斯矣哀今之世誰是其人奇哉大導師華山見月老和尚是也續佛祖將頹之緒起南山已墜之綱發明止作垂範後昆法門屏翰巍乎蕩乎誠不可涯量也雖然若無承秉何益來學幸有昭慶宜潔大師為其嗣也志堅根利記錄無遺佛法大海水流入阿難心不是過也先出香乳記兼通大小今集羯磨儀別為僧尼其間事事盡理法法依制果能依教奉行則知靈山一會儼然未散也適以惠予閱之不勝躍是儀興則佛法興是儀滅則佛法滅矣然時丁末運法道下衰匪仗毗尼則佛法奚能光顯而僧伽何所統攝耶以是而經綸之則能於五濁惡世說此難信之法而現優曇於後五百歲矣因觀喜讚歎而為之序康熈己卯春上元節旦慈雲灌頂行者續法合十題羯磨儀式緣起古杭昭慶萬壽戒壇傳律沙門書玉述毗尼源委止作功能律藏載之詳矣唐南山宗主澄照聖師念律海淵深學人難探故於四分廣律撮略正文諸部毗尼採摭要義類聚編之就其時用題云四分律刪補隨機羯磨於中定淆訛決是非綱宗立矣宋昭慶允堪律師出會正記靈芝元照律師以圓意作資持記似與會正殊途實乃同推南山之意而上合佛祖之心如折金杖金體無失者也嗣後分燈各幟法漸式微布薩羯磨寂無聞矣於戲愈遠而愈迷其本益久而益失其真焉明萬曆間吾祖翁古心律師乘願而來禮見文殊指授戒法中興三昧師祖承之大振寰宇皇清順治乙酉本師見月老和尚繼席寶華翻閱全藏考核毗尼撰止持會集以明四分戒本註作持續釋用解隨機羯磨安居自恣布薩羯磨事事遵行復還舊制時人皆稱為南山再世也己未春老人掩室典誥具存辨僧事時猶未精悉諺云方飲多未若臨症多始知人在則易人亡則難故觀者咸為慨歎時同門顓一律師與余共相論曰禪門有列祖提綱講家有台賢教義吾宗若得出一部羯磨儀式則一切作法等事不致於生疎茫昧矣然道必有本學必有宗先老人之弘範為後學之成規也余曰和尚可出此書流益將來作人天眼目顓曰吾年衰邁神智昏矣爾在茂齡正應努力玉雖識見膚淺學術荒蕪當法門大事頓忘鄙陋因之凝想先老人說法規模或值一二疑難處請益於耆宿再將作持續釋一一體會便學先型竝在耳目矣於是錄成羯磨儀式以為自新要務二十年來不授梨棗者意欲參考於無盡也邇因抄寫紛紜瓜爪混雜羣弟子慫慂刊之故又研磨再四補失刪繁將時事與非時事分開上下兩卷以便檢討雖律宗綱要不在於茲而作辦之體大略備矣壁如鎔金之法必在火鑄器之方必在模金無火則不化器無模則不成佛法亦若是也浣染成淨須假羯磨感發殷心要藉儀式緣成則彼此事辦緣壞則能所皆非若無儀式作辨誰稽羯磨由此虗設也或曰明此儀式能秉羯磨則律藏作持不須檢矣余曰律藏大部總也隨機羯磨別也作持續釋詳也羯磨儀式略也如是或總或別或詳或略隨機行用竝為法要既學律宗必須博究毗尼深明大部烏可得少為足者耶或又曰何不揣本而齊末乎余曰入海算波豈不難哉今以一滴微波窮盡全潮瀛渤誠易易也斯文不其然乎以事習儀因儀立事俾諸覧者從末以推其本㴑流而尋其源嚴淨毗尼弘範三界未嘗不以此為一助也板刻既成爰筆為敘旹康熈三十七年十月望旦羯磨儀式凡例十則是書大要以佛僧作法為題如律辨事為目蓋佛祖作辨於先必有儀式垂後奕葉相承令法久住今依律集儀以資來學喻海一滴略被初機律中所明一百八十四種羯磨各有成濟之功其出內興廢作持詳釋今文分二十篇二百十四法此但約法被事就其時用云爾毗尼屬事有乎二十一者時事謂懺摩布薩安居自恣以時而作故二者非時事謂一切成善治罰羯磨有無不定故然羯磨雖多此二攝盡今以上卷明時事開為十篇下卷明非時事亦開十篇若欲作法便於檢討時事十篇中法開九十五條非時事十篇中法開百十九條斯亦隨其事法大小以分原無定例未展卷前先目錄者令人略知梗概然後委明枝葉故開卷至終先標章次出文俱大字行儀引證竝細註眉目若能清白脉絡自然貫通矣羯磨乃如來制度之法主法者是代佛能說之人呼召者是受佛所教之眾是故羯磨儀文主法開導之語呼召禮跪之詞竝書於頂格其餘附明者皆低一字以俟參證儀中能秉之法以作持為主所作之處宜華山為例但處有不同可以更移而羯磨儀法定不可易也作法辨事名為羯磨承先啟後故曰儀式住持正法全在羯磨秉宜如式方合聖制少有乖違便名非法是故佛言有秉羯磨及如說行者斯則名為正法久住也若作羯磨不如白法作白不如羯磨法作羯磨如是漸令正法疾滅矣後之行者當隨順文句勿令增減違法毗尼當如是學羯磨乃比丘要務一切僧事依之而成若非羯磨作法不成矣凡為羯磨者必須五夏依學毗尼曉了開遮持犯方堪秉白故律云若不能誦白羯磨終身不得離依止也宜誡勉之羯磨儀式凡例終羯磨儀式目錄上卷時事第一黑白懺摩篇四法先明悔過法如律審戒法上殿禮佛法呈罪稱量法第二半月布薩篇十四法先知淨住法起緣說戒法淨堂敷座法整儀入眾法請師陞座法誡敕小眾法問和行籌法白時誦戒法續誦大乘法難緣略說法對首說戒法心念說戒法集結小界法說已解界法第三受籌結夏篇六法灑掃敷座法安詳聚集法次序迎請法禮拜歸位法集白差使法日行舍羅法第四依止安居篇七法鳴椎集眾法拈香禮佛法對首安居法二則初依處不依人次依人必依處註明日課法序記臘次法心念遙依法請依止師法第五悔過修淨篇二法親臨審戒法具儀呈課法第六自恣解夏篇十一法如制採艸法問緣索欲法敷座請師法集僧作辨法差受自恣法行艸敷座法白僧隨意法遵敷結示法難緣略說法三則眾法對首第一略第二略單自己有三略展轉憶念法一人心念法第七德衣授受篇十法敷設集僧法問答和白法差人持衣法羯磨付託法張衣示眾法為僧授受法四人受衣法三人受衣法對首受衣法獨受德衣法第八出衣遮利篇七法淨堂集眾法呈衣復上法問答所成法單白出衣法嚴禁五事法稱量施衣法三二獨捨法第九捨受衣藥篇十三法正捨三衣法正受三衣法權受從衣法捨尼師壇法受尼師壇法捨鉢多羅法受鉢多羅法證受三藥法一非府藥二七日藥三盡形壽藥請淨施主法衣藥說淨法尼受二衣法一僧祗支二覆肩衣勤䇿捨衣法勤䇿受衣法第十心念捨受篇八法念捨三衣法念受三衣法念捨坐具法念受坐具法念捨應器法念受應器法念受三藥法一非時藥二七日藥三盡形壽藥長衣說淨法下卷非時事第一結解諸界篇七法預瞻標相法集僧結界法作前方便法先結戒場法正結大界法量結攝衣法有緣解界法三則先解衣界次解大界後解戒場第二受日出界篇九法鳴椎集眾法呈情乞假法問答所成法稱量允可法警示出界法對首受日法聽受殘夜法心念受日法念受殘夜法第三處分亡物篇十三法如律集眾法捨物與僧法集僧答問法量功賞德法還施亡物法差人處分法羯磨付物法示物輕重法稱量估價法施無衣人法四人真分法三二人分法心念取物法第四與覆藏行篇二種初與但覆藏羯磨十五法露非方便法鳴椎集眾法呈白犯緣法乞允羯磨法問答所成法考察從生法屏除小罪法先懺從生罪次懺根本罪後懺故妄無知二墮僧與羯磨法奪五七事法白僧行行法諭防八事法布薩白僧法白僧停行法代白停行法白僧起行法二與覆藏本日治羯磨二法初有覆本日治法第五與摩那埵篇四種初與無覆摩那埵羯磨二與有覆摩那埵羯磨五法先白行滿法正乞意喜法當與羯磨法白僧行行法日日白僧法三與摩那埵本日治羯磨四與壞覆藏及壞摩那埵本日治羯磨第六行滿出罪篇五種初與但行摩那埵出罪羯磨五法如律集僧法呈白行滿法求僧與法法羯磨拔罪法開導守持法二與不壞覆藏不壞摩那埵出罪羯磨三與壞覆藏及壞摩那埵出罪羯磨四與壞覆藏不壞摩那埵出罪羯磨五與不壞覆藏壞摩那埵出罪羯磨第七懺偷蘭遮篇三種初主品僧中懺九法露罪集從法從僧乞懺法請師懺悔法答問所成法白僧忍可法檢校八品法屏除小罪法二則先懺從生法次懺根本法懺主回復法正懺偷蘭法二中品向四比丘懺二法禮請懺主法懺主白眾法三下品對一比丘懺第八懺波逸提篇二種先懺捨墮十六法乞求露罪法知時集眾法呈白犯緣法捨本犯財法二則初定捨法次不定捨法從僧乞懺法集僧作辨法受請白僧法考察從生法屏除小罪法三則先請懺悔主次懺從生罪後懺根本罪僧中捨墮法開導責心法即座還衣法有緣轉付法經宿還衣法四三人懺法對首懺衣法後懺單墮三法先懺從生法次懺默妄語後捨本墮法第九懺可呵法篇二法分別罪體法請師悔過法第十懺突吉羅篇二法初除故作法次除悞作法羯磨儀式目錄
