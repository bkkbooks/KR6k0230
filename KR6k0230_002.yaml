而起南山律祖云其長途謹誦多有繁濫檢過則無不可妄指藏罪著用隨犯方言希故削除有則如前作法若無即懺根本十僧中捨墮法到僧中犯者側立下傍受懺者居中向上合掌如是復言我某甲為某甲比丘懺悔二五八品小罪已竟尚云善答爾一拜而起問訊犯者然後往中間向懺主作禮一拜問訊長跪彼此合掌至誠捨罪大德一心念我比丘某甲故離三衣宿或云故畜衆多長衣犯捨墮若離二衣或一衣者隨事更文是衣已捨與僧有三二一或云衆多波逸提罪今向大德發露懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不敢覆藏願大德憶我清淨戒身具足清淨布薩三説受懺者言自責汝心生厭離答爾一叩餘捨墮法皆準此例十一開導責心法懺悔主云文中説懺悔則安樂者此有三義一者是因安樂調持戒知非律名智人以身居有漏心等凡流宿習既深現熏易發而能具慙説露誠意洗愆猶浣故衣垢盡仍潔毗尼作法亦復如是不為衆遠不雜於衆故得安樂二者華報安樂謂五篇已淨三增未強不歷惡途權受天福故得安樂三者果報安樂謂無漏三學為因有餘涅槃是果得證涅槃永離諸患不受後有故云懺悔則安樂也不懺悔不安樂者若犯罪覆藏則二報無由三途必往故云不懺悔不安樂也憶念犯發露知而不敢覆藏者正顯自言治法非他所舉之義也願大德憶我清淨戒身具足者是乞懇前人為己作證之語戒身即戒體謂無染無缺名曰具足即是清淨義由清淨具足故得同僧羯磨同僧布薩也此自責汝心生厭離一句是呵責之言汝答云爾之一字是立誓之語雖然是我指示汝呵責立誓全要自己心境相應自責汝心者責何等心律攝云凡犯戒者有五種心發起因緣一者無差耻心二者無敬教心三者情懷放逸心四者稟性癡鈍心五者忘失正念心今正令汝自責如是等心當生厭離者慎勿復起如是心違犯如來禁戒也汝自答云爾之一字如泰山之重此乃是深慙立誓痛責之言今既蒙和尚慈悲清淨大衆如法如律懺悔已縱遇喪身失命因緣寧死誓不要更犯如來禁戒故云立誓也説已一叩而起問訊復位十二即座還衣法和尚再開示還衣法竟乃至云作法還衣與他若有二人同懺者所離之衣相同并持手中一番作白如或不然各秉羯磨懺悔主雙手持衣白云大德僧聽某甲比丘故離三衣宿犯捨墮此衣已捨與僧所離之衣或有不在者如前牒名而還若僧時到僧忍聽僧今持此衣還某甲比丘白如是大德僧聽某甲比丘故離三衣宿犯捨墮此衣已捨與僧僧今持此衣還某甲比丘誰諸長老忍僧持此衣還某甲比丘者默然誰不忍者説僧已忍還某甲比丘衣竟僧忍默然故是事如是持白已求懺者居中向上一拜問訊長跪合掌懺悔主以衣還彼手中而作是言此衣憑衆僧前作法還你似同新得再莫要離了彼接衣已仍如前令一人為彼持之于傍立和尚復當警䇿守持勿令輕易知事人呼云起立至誠禮謝和尚三拜尚云普禮僧足兩邊齊合掌拜已問訊傍立知事人復云大衆頂禮和尚尚云免禮大衆各次序散其懺悔者持三衣隨懺悔主往屏處如上卷第九篇中儀文受已以衣送回知事人引彼到方丈再禮謝和尚已然後往各處禮謝大衆畢復拜過知事人方回十三有緣轉付法佛言若衆僧多難集此比丘有因緣事欲遠行者應問言汝此衣物與誰隨彼説便與是中有一月衣急施衣過後畜長鉢殘藥長衣此五長戒依此法還之作法者當如是白大德僧聽某甲比丘故畜衆多若干長衣犯捨墮此衣已捨與僧若僧時到僧忍聽僧今持是衣與某甲比丘某甲比丘當還此比丘白如是大德僧聽此某甲比丘故畜衆多若干長衣犯捨墮此衣已捨與僧僧今持此衣與某甲比丘某甲比丘當還此比丘誰諸長老忍僧持此衣與某甲比丘某甲比丘當還此比丘者默然誰不忍者説僧已忍持此衣與某甲比丘某甲比丘當還某甲比丘竟僧忍默然故是事如是持如未成衣應言長衣財十四經宿還衣法作前方便答還長衣羯磨大德僧聽某甲比丘故畜衆多長衣犯捨墮此衣已捨與僧若僧時到僧忍聽僧今持是衣還某甲比丘白如是大德僧聽某甲比丘故畜衆多長衣犯捨墮此衣已捨與僧僧今持此衣還某甲比丘誰諸長老忍僧持此衣還某甲比丘者默然誰不忍者説僧已忍還某甲比丘衣竟僧忍默然故是事如是持十五四三人懺法佛言若向四人懺者捨財文同於上懺罪須口和三人不得用單白還財得作直付羯磨如上白法若欲在三比丘前懺悔者應至三清淨比丘所如前懺法其修威儀如是捨言諸大德聽我某甲比丘故離三衣宿或云故畜衆多長衣犯捨墮我今捨與諸大德一説作是捨已乞懺畢主法者隨意指示罪初名種先請懺悔主其請詞及檢過從生八品有無并發露禮僧等儀式皆如前僧中無異其懺悔主應問餘二比丘言二長老若長老聽我受某甲比丘懺悔者我當受二比丘答云可爾答已懺悔竟還衣當如是白二長老聽某甲比丘故離三衣宿或云故畜衆多長衣犯捨墮此衣已捨與我等若二長老忍者今持此衣還某甲比丘二比丘答言可爾對二人懺法亦爾惟除二字為異十六對首懺衣法佛言若在一比丘前懺悔者至一清淨比丘所應如法懺今時行事對首懺多故須明立定式使披尋者易為照練捨衣法應將一比丘至自然界中或戒場上將所犯財並束一處其修威儀如是捨言大德一心念我某甲比丘故離三衣宿或云故畜衆多長衣犯捨墮今捨與大德一説餘詞如上懺悔主應為分別罪名種相名謂六聚差別種為畜長離衣三十事異相謂一多不同故律云一名多種住別異也後懺故妄語非時食二單墮三法先懺從生法儀式文詞盡如前作此唯是對首悔過不同僧法為別如求懺者具修威儀當作是説大德一心念我某甲比丘故非時食犯衆多波逸提罪經夜覆藏隨夜展轉覆藏經僧説戒默妄語犯突吉羅罪經夜覆藏隨夜展轉覆藏並犯突吉羅罪不憶數今向大德發露懺悔更不敢作願大德憶我一説受懺者云自責汝心生厭離答爾一叩次悔默妄語大德一心念我某甲比丘經僧説戒默妄語犯突吉羅罪今向大德發露懺悔更不敢作願大德憶我一説受懺者言自責汝心生厭離答爾一叩若未聽戒則無此罪及二品從生後捨本墮法大德一心念我某甲比丘故非時食犯衆多波逸提罪今向大德發露懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不敢覆藏願大德憶我清淨戒身具足清淨布薩三説受懺者言自責汝心生厭離答爾一叩而起其故妄語罪如覆藏篇中懺餘單墮法例此可曉第九懺可呵法篇二法初分別罪體法可呵法者謂比丘在村巷中從非親里尼自手受食食或食尼指授食或受學家食或阿蘭若比丘在僧伽藍內自手受食食而成罪也此四法之中如受尼指示食者若無約敕止語食則成罪凡同受食諸比丘一一皆須向彼説悔罪方得除若餘三法中有犯者但問無病食即成罪只向一比丘前説悔罪便得滅諸律令請一人為懺悔主説罪名種一説便止次請師悔過法其請法與波逸提同唯更罪名為異於中小罪檢察有無事非一定有則先懺若無即悔本罪大德一心念我某甲比丘食比丘尼指授食犯波羅提提舍尼罪不憶數大德我犯可呵法所不應為今向大德悔過僧祗律云前人應問言汝見罪否答言見應呵責言慎莫更作答頂戴受持一叩而起第十懺突吉羅篇二法初除故作法佛言若故作者犯應懺突吉羅又犯非威儀突吉羅律本具明故誤二心唱言爾罪條別其請懺主等儀同上從生根本名須爾識種相多少並委審詳有覆則如前先懺若無但悔根本大德一心念我某甲比丘故不齊整著僧伽黎餘有準加犯突吉羅罪今向大德發露懺悔更不敢作願大德憶我一説受懺者言自責汝心生厭離答爾一叩而起此但準一百法中初戒而言餘有所犯懺法同上唯更罪名為異若誦戒錯落或羯磨差脫者則云錯落毗尼犯突吉羅罪若羯磨文中多字而作或少白字者則云增減毗尼犯突吉羅罪若自作羯磨羯磨作白或牒事不清説欲錯者則云顛倒毗尼犯突吉羅罪若破安居者則云故破安居犯突吉羅罪今向大德云云次除誤作法應具修威儀心生慚愧口作是言我某甲比丘誤不齊整著僧伽黎犯突吉羅罪我今自責心悔過一説十誦毗尼序云若賊捕得若病人雖相應罪聽心念口言懺後從清淨比丘懺悔後聽受彼所言相應罪者同犯此一罪也謂平居之時不得向同犯者懺悔同犯者亦不得受他懺悔今在難中故令不病之人不被賊捕之人先作意曰我今此罪後更當從清淨比丘懺悔作此意已即得受彼病人賊捕得人懺悔使彼死後不墮落也根本雜事云具五種法應作懺摩一者有信心二者發精進三者生恭敬四者口出美言五者近善知識毗尼母論云上座於下座前懺悔者應具四法一者褊袒右肩二者脫革屣三者合掌四者説所犯罪下座向上座懺悔者應立五法四法如前加胡跪一法本律云上座向下座懺悔者但除禮足亦須胡跪此上座不約九夏二十夏外論也但先受持具足戒而言乃至須臾頃者即名上座梵語悉替那此云上座亦名上士具自利利他行者為上士單自利者為中士無一利行者名下士故須跪也然懺者受者善須珍重跋本師先老和尚之中興止作也乃苦心閲律深究開遮竭力躬行方還佛制所以律風扇於宇內稱為古佛再來非謂逞性而行妄齊先哲者也故世尊滅後迦葉尊者語阿難言供養舍利乃人天所為非我等事宜當結集如來法藏玉行解踈缺辜負師門不能高竪法幢僅將羯磨儀式記録於此以益時機倘有同志競行庶可報佛祖深恩於萬一也戊寅佛成道日書玉閣筆題音釋戒場場者地也衆僧作法結地為場於中受戒故曰戒場律云有須四人十人二十人羯磨事起衆僧集會疲極佛言聽結戒場檀越檀是梵音此云施越是此方之言謂人能行施即得超越貧窮苦海故常住古今不變為常依處不移為住盛衣貯器文具箱籠之類四方僧物或云十方四方唯凡十方通聖如供僧常食體遍十方唯局本處故現前僧物此有二種一如檀越所施之物唯施此處現前僧故二如亡五衆輕物未秉羯磨通於十方白羯磨已唯局本處波利婆沙四分律云覆藏行律攝云覆有兩種一覆夜二覆心若作覆藏心至過明相出是名一夜覆藏根本律云遍住行律攝云別住行摩那埵漢言折伏貢高亦言下意謂承事衆僧故秦言意喜目意歡喜亦使衆僧歡喜也出罪梵語阿浮訶那漢言喚入亦云拔罪即出罪也謂布薩羯磨自恣説戒一切法事皆得共同故母論中名清淨戒生謂於此戒中清淨無犯善持起去故偷蘭遮善見律云偷蘭名大遮言障謂障善道後墮惡道體是鄙穢從不善以立名也獨頭亦名自性偷蘭乃別自犯故謂本發心破羯磨轉法輪僧或發心盜四錢以下等若遂所欲是名獨頭長衣長者餘也若有多餘衣財長一尺六寸濶八寸即名長衣應當説淨有漏謂不修出世善法漏落三界生死故無漏謂修出世善法證得無餘涅槃故三學戒定慧也三增增戒增心增慧有餘涅槃涅言不生槃言不滅不生不滅故言涅槃秦言無為或翻圓寂或言泥洹有翻安樂謂已離煩惱結賊故有餘苦謂子縛已斷果縛猶存故氍氀音渠呂毛席也又曰毛布即氈縟之類二報華報果報三途地獄餓鬼畜生自然界未曾作法故阿蘭若或名阿練若多論翻為間靜處天台云不作衆事名間無憒閙故名靜或翻無諍謂所居不與世諍即離聚落五里處也須臾頃梵名摩睺羅毗曇論翻為須臾一日一夜有三十須臾言極少時也
