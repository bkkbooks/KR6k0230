body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉編非時事第一結解諸界篇七法初預瞻標相法準律所明大凡比丘所居之處不得無界而棲若違制者作法不成衆僧得罪苾芻若依城邑村落境內僧伽藍住欲行僧法創結大界者上座先稱量界限令知事人豎立四方標相有戒場者三重內裏一重為戒場外相中間一重為大界內相最外一重為大界外相若無戒場者唯是外相一重安立相已隨此境內比丘若干應須往約結期先共觀其標相至外界者其知事人應指示云此是大界外相某隅以何為標至內界者亦應指示云此是大界內相某隅以何為標又指示云此是戒場外相某隅以何為標大衆各須明記無忘俾臨時聞唱告之聲心中憶想標相隨現也二集僧結界法時至鳴椎此如誦戒法打鐘五十四下大衆聞已各整威儀若結有戒場大界者盡集戒場標相內立不聽與欲若有沙彌及淨人者應遣離見不聞處立大衆盡集已其知事人往方丈請和尚至戒場標相內立已作如是言大衆向上排班頂禮和尚三拜尚云一拜和尚聞示結界制起緣由已然後集僧作法三作前方便法佛言若先已結界者有疑應解已更結若創結者作前方便答結戒場羯磨四先結戒場法衆中堪能唱三重四方界相一舊住比丘若無舊住有識相者得出衆向尚一拜問訊歸位白云大德僧聽我此住處比丘若非舊住當云我識相比丘為僧稱四方小界相此句立白已轉身至東南面向大衆云從此住處東南角某標下句且不應説即從此往至西南面向大衆其大衆俱隨方便面向彼方憶想彼方標相儼然在目前下皆準此唱相比丘應合掌白云至西南角某標從此北回轉身行至西北角仍面向大衆立定方言至西北角某標從此東回唱已復行至東北角仍面向大衆立定方言至東北角某標從此南回亦如前行至東南角面向大衆立定方言還至東南角某標此是戒場外相一周訖如是三説若有邪曲隨事稱之大衆皆應一一隨彼外向三唱已其唱者仍作禮一拜問訊歸位和尚云羯磨者作法彼比丘聞已即出衆向和尚一拜問訊歸位在班前立合掌如是白云大德僧聽此住處比丘稱四方小界相若僧時到僧忍聽僧今於此四方小界相內結作戒場白如是大德僧聽此住處比丘稱四方小界相僧今於此四方小界相內結戒場誰諸長老忍僧於此四方相內結戒場者默然誰不忍者説僧已忍於此四方相內結戒場竟僧忍默然故是事如是持禮儀如上五正結大界法戒場結已大衆齊至大界內有沙彌淨人應遣至戒場內若路通標相恐有往來者僧中方便差四五比丘到大界外於各標相路口守之倘比丘有來者令暫住待作法已方令入其白衣人應善却之別往恐磨羯不和事無成濟應復集僧何以故界址既異僧已移出此處非彼故須另問也作前方便答結大界羯磨儀式如前但此中唱相與前小異故復釋之大德僧聽我此住處比丘為僧唱四方大界內外相先唱內相此句立唱已轉身至內相東南背方面內云此是大界內相東南角某標從此西回至西南角某標大衆隨方面轉下皆準此唱相者至西南背方面內立合掌云從此北回至西北角某標仍至西北背方面內立云從此東回至東北角某標仍至東北背方面內云從此南回還至東南角某標仍至東南背方面內云次唱外相轉身背內相面向外大衆面東南立唱者云從此住處東南角某處標西回至西南角某處標唱此外相時諸比丘各應憶想先所觀標相身雖未達於彼其標相如對目前唱者至西南背內面外相立云從此北回至西北角某處標至西北背內面外相立云從此東回至東北角某處標至東北背內面外相立云從此南回還至東南角某標至東南轉面向衆立云彼為內相此為外相此是大界內外相一周訖如是三唱已向和尚一拜問訊歸位其律文但云某標唱時應言以某為標方顯如大界內相若戒場遮障或有隔者遙指亦得然唱相但言隅者易就地故若唱四方難取便也必有屈曲隨事稱之並須別指分齊尺寸處所由不知制限結既不成羯磨虗設受戒等法俱是空作故須如上文明唱相三遍已佛言衆中應差羯磨人若上座若次座若誦律堪能作羯磨者秉法和尚云羯磨者作法大德僧聽此住處比丘唱四方大界相若僧時到僧忍聽僧今於此四方相內結大界同一住處同一説戒白如是大德僧聽此住處比丘唱四方大界相僧今於此四方相內結大界同一住處同一説戒誰諸長老忍僧今於此四方相內結大界同一住處同一説戒者默然誰不忍者説至此少停待僧稱量凡秉羯磨皆準此式僧已忍於此四方相內同一住處同一説戒結大界竟僧忍默然故是事如是持六量結攝衣法準律所明若大界共伽藍等或界小於伽藍並不須結若大於伽藍者如律結之作法者當如是白大德僧聽此處同一住處同一説戒若僧時到僧忍聽僧今結不失衣界除村村外界白如是大德僧聽此處同一住處同一説戒僧今結不失衣界除村村外界誰諸長老忍僧於此處同一住處同一説戒結不失衣界除村村外界者默然誰不忍者説僧已忍此處同一住處同一説戒結不失衣界除村村外界竟僧忍默然故是事如是持儀式如上知事者云大衆頂禮和尚尚云免禮各次第散既結界已應書戒相標榜指明三相方隅二界內外并攝衣界有無張示顯處令後來住者知界分齊於同中取別以防離衣及別衆故凡行僧事皆應盡集方名不背六和之體七有緣解界法三先解衣界初結界時先結戒場次結大界後結攝衣界若欲解時先解衣界次解大界後解戒場其衣界應在大界後結者為依大界限齊故解時應在先者以此界是浮故若先解大界則不必更解何也根本既除浮界亦無所依故若先解者集僧法儀皆同於上唯答云解界羯磨作法者當如是白大德僧聽此住處比丘同一住處同一説戒若僧時到僧忍聽僧今解不失衣界白如是大德僧聽此住處比丘同一住處同一説戒僧今解不失衣界誰諸長老忍僧同一住處同一説戒解不失衣界者默然誰不忍者説僧已忍同一住處同一説戒解不失衣界竟僧忍默然故是事如是持次解大界律云時諸比丘意欲廣作者狹作者佛言欲改作者先解前界然後廣狹作從意其鳴椎集衆問答法儀皆如前作羯磨者當如是解大德僧聽此住處比丘同一住處同一説戒若僧時到僧忍聽解界白如是大德僧聽此住處比丘同一住處同一説戒今解界誰諸長老忍僧同一住處同一説戒解界者默然誰不忍者説僧已忍聽同一住處同一説戒解界竟僧忍默然故是事如是持此羯磨不獨解大界倘有不失衣界及周庫等諸界通解何以故由文無偏局故若言解大界者則不得通解須一一別解以文各異故十誦律云捨大界不離衣界亦捨若捨不離衣界大界不捨又云若先結界不捨不得更結界後解戒場結由緣故開後有緣必解所以例之備用其一切集僧法儀皆如上作但律無正文南由律祖準諸解法亦例出理通文順作法者應如是解大德僧聽僧今集此住處解戒場若僧時到僧忍聽解戒場白如是大德僧聽僧今集此住處解戒場誰諸長老忍僧集此住處解戒場者默然誰不忍者説僧已忍解戒場竟僧忍默然故是事如是持餘儀皆同上第二受日出界篇其安居受日有無不定故類非時有九法初鳴椎集衆法律中佛言安居苾芻若有佛事法事僧事及父母檀越召請受戒懺悔等緣並瞻病求藥問疑請法如是諸事不及即日還聽受七日去不及七日還聽受半月去半月不及還當受一月去其三種受日並不通夜前一是對首羯磨後二皆是僧法白二羯磨若果有如上因緣事須僧中受者應預告知事人通白和尚準已然後再訴內外大衆以見一界同棲來去均知非是不善因緣而出界也其伽藍若是無戒場大界者至時知事人應差堪能者索欲已然後教打楗椎加懺摩法打鼓大衆聞之各整威儀至作法處衆僧齊集已知事人往方丈通會侍者請和尚到作法處如是言大衆向上頂禮和尚尚應云免禮或云一拜禮畢分班知事人教受日者出衆居中向上展具已呼云先頂禮和尚三拜和尚云我亦是僧中數大衆齊合掌二呈情乞假法拜已應先告情律無乞詞惟受日者高聲向衆説云我某甲今為某事因緣不得不往七日不能回要作半一月法出界求和尚大衆師傅慈悲説已一拜起具問訊傍立若為常住事不得不往一句不必説若有同受日者事若不同或日不等亦如上向衆作禮呈白自己出界因緣已另白羯磨由出界是同因緣與日有異故若事與日俱同者二人三人一番羯磨四五六人作兩番白三問答所成法和尚於此處為衆開示已合掌問云僧集否知事人答僧已集和合否和合未受具戒者出否是中無有未受具戒者不來諸比丘説欲有否持欲者合掌高聲答有即居中向上隨具一拜問訊長跪合掌白云大德僧聽衆多比丘我受彼欲彼如法僧事與欲羯磨一説尚云善答爾一拜起具問訊歸位後皆準此尚復問云僧今和合何所作為答受半一月日出界羯磨四稱量允可法作前方便已和尚大衆稱量受日之人情與事緣實與不實應與半月一月準事與之不得重情輕法定已和尚云羯磨者作法羯磨人聞已應出衆向上一拜或免即止拜已歸位合掌白云大德僧聽若僧時到僧忍聽比丘某甲受過七日法半一月日出界外為某事故還來此中安居白如是大德僧聽比丘某甲受過七日法半一月日出界外為某事故還來此中安居誰諸長老忍僧聽比丘某甲受過七日法半一月日出界外為某事故還來此中安居者默然誰不忍者説僧已忍聽比丘某甲受過七日法半一月日出界外為某事故還來此中安居竟僧忍默然故是事如是持羯磨已作法者仍應向尚一拜若免即止其受日人由衆向上三拜或一禮傍立於前五警示出界法和尚云雖然法聻是受得半一月假身雖出界外而心中常常要憶念在界內莫要放逸日課照常做事訖即還界不許定要等日期完方回若事完故意在外不還虗廢時光者即名被夏不成安居説已受日者復應出衆謝和尚大衆已知事人云大衆頂禮和尚尚云免禮各次第散其受日人於出界時先至枝堂上號云某日出界以見來失分明而表其驗證有據也六對首受日法律論但聽受七日並無正法傳羯磨白中義亦無失若有六日五日乃至一日事緣不及即日還者皆作此法受日唯不通夜事訖即還不得留連時有事出界比丘不知對誰作法佛言應對一比丘而秉其法若無比丘當從餘四衆受其受日人應先啓白和尚知稱量允已然後至比丘所具儀作禮亦如前法先告其情次方秉白其所對之人若是同戒或是下座者對立白詞若是上座及前戒者拜已長跪合掌白云長老一心念我比丘某甲今受七日法出界外為某事故還來此中安居白長老知三説所對者云善答爾一叩而起如前上號已方出界七聽受殘夜法十誦律中佛言若比丘受七夜法出界外未盡而還事未竟者聽受殘夜去當具儀作禮如是白言大德一心念我比丘某甲受七夜法若干夜在受彼出一説所對者言善答爾一叩而去若事緣異者則不應受當另作法八心念受日法十誦律中開獨住比丘心念受日應具修威儀心念口言我比丘某甲今受七日法出界為某事故還來此中安居三説出界時自記日數事訖即還必須以法為重憶念界中不得開遮由己相似安居有名無實者九念受殘夜法十誦律云若比丘心念受七夜法出界未盡而還事未竟佛言聽受殘夜法如前威儀心念口言我比丘某甲受七夜法若干夜在受彼出一説若事異者謂緣不相同也重受七日去第三處分亡物篇十三法初如律集衆法出家六和利均為一抱道無貧名真釋子衣揵度中佛慈頻制此撰集內祖復廣明當思採補之心莫作泛常之語遇事奉行最為急要出作持僧祗律云若病者死不可信者應持戶鈎付僧知事人然後供養舍利毗尼母云先將亡者去藏殯已送喪僧還來至寺取亡人衣物著僧前然後依法集僧分之此乃見律意如是若論如律所行儀式者同界比丘死瞻病者即應通白知事人其知事人報和尚知教鳴鐘三下大衆聞知各脫長衣著安陀會齊集龕前此有二義一者見他人幻化如是警策自己精進修行二者以顯袈裟眷屬過於常人送亡者去火浴已還來寺中若無戒場先應差人索欲已方教打揵椎如懺摩法打鼓惟五十三下大衆聞之各整威儀至作法處衆僧集已知事人往方丈請和尚來復作是説大衆頂禮和尚尚云免禮二捨物與僧法其看病人將亡者衣物盡情擔入僧中已居中向上立知事人呼云問訊展大具先頂禮和尚三拜尚云普禮僧足大衆齊合掌拜已問訊長跪合掌瞻病人白云大德僧聽某甲比丘於此彼住處命過所有衣物此住處現前僧應分三説一拜起具傍立三集僧答問法和尚開示已作前方便答分亡僧衣物羯磨四量功賞德法和尚云羯磨者先賞看病人物次白二差人然後付物處分作法者聞已出衆向上一戶若免即止和尚問看病人云汝當時看病是僧所差是自己發心的若言是自己發心的應復問云汝初發心時是何主意若言是慈愍心為饒益病人故又素常知彼具五法者和尚告大衆云我某甲向來會聞此人看病事事如法不知大衆所聞何如若大衆皆言果如所説者尚云既然有功理應賞德此時將亡者所持三衣鉢具羯磨與他其知事人即往衣所稱量功行大小或總與或但取衣具并鉢送無作法者手中彼接已白云大德僧聽某甲比丘命過所有三衣鉢坐具針筒盛衣貯器隨當時有者牒入或云所有諸衣物此現前僧應分若僧時到僧忍聽僧今或云持某衣物與某甲看病比丘白如是大德僧聽某甲比丘命過所有諸衣物此現前僧應分僧今持某衣物與某甲看病比丘誰諸長老忍僧與某甲看病比丘某衣物者默然誰不忍者説僧已忍與某甲看病比丘某衣物竟僧忍默然故是事如是持如是白已持衣鉢等物與彼其瞻病人即出衆先應禮謝和尚及大衆已然後方受此據五德全者如是若中下看病者賞勞之法或增或減臨時稱量如但與一衣牒衣名而白若無五德則不應賞可入輕物中作法若是白衣人看病與少許物五還施亡物法若病人在生時與他人物已彼人不忍持去者仍還病人處後病人死此物應準五分律白二羯磨與彼作法者手持物白云大德僧聽某甲比丘於此處命過彼生存時已將某物與某甲彼未持去若僧時到僧忍聽僧今持此某物與某甲白如是大德僧聽某甲比丘於此處命過彼生存時已將某物與某甲彼未持去僧今持此某物與某甲誰諸長老忍僧持此某物與某甲者默然誰不忍者説僧已忍持此某物與某甲竟僧忍默然故是事如是持如是白已若人現前者即應出班居中向上禮謝和尚及大衆已然後持去若不現前另日與之六差人處分法羯磨者當酌量衆中有具五德人知物輕重能估價者應差彼人估唱分之當如是白大德僧聽若僧時到僧忍聽僧今差某甲比丘為僧分輕重亡物白如是大德僧聽僧今差某甲比丘為僧分輕重亡物誰諸長老忍僧差某甲比丘為僧分輕重亡物者默然誰不忍者説僧已忍差某甲比丘為僧分輕重亡物竟僧忍默然故是事如是持白已其受差人應出衆居中向上頂禮和尚一拜復歸本位七羯磨付物法毗尼母論云五人共住一人死不得作展轉分律中出法少不具足準非時僧得施羯磨具有展轉之言則五人已上須用此法律文當差一人令分白二羯磨與之有人存三番作法此思文米了亦有存二番作法者今準羯磨文中具含付分二法餘無故不出準律羯磨應白云大德僧聽某甲比丘命過所有衣物現前僧應分若僧時到僧忍聽僧今持是衣物與比丘某甲某甲當還與僧白如是第二個某甲應更彼比丘還字改分字方顯應云彼比丘當分與僧大德僧聽某甲比丘命過所有衣物現前僧應分僧今持是衣物與比丘某甲某甲當還與僧誰諸長老忍某甲比丘命過所有諸衣物現前僧應分僧今持與比丘某甲某甲當還與僧者默然誰不忍者説僧已忍持此衣物與比丘某甲某甲當還與僧竟僧忍默然故是事如是持律云衆僧羯磨已從來比丘不與分八示物輕重法其受差人聞已即應出班於中側身立定作如是言律中佛言若比丘死若多知識若無知識所有衣物一切屬僧然僧有其二種一四方僧二現前僧物亦有二種一是輕物二是重物輕物是可分物重物是不可分物何等是不可分物比丘所有園田果樹別房及屬別房物銅鉼銅瓫斧鑿燈臺繩床木床生蓐臥蓐帳幔氍氀車輿守僧伽藍人水瓶澡罐錫杖扇並五種作器鐵作器木作器陶作器皮作器所作器及諸種種重物此屬四方僧並不應分若氍氀長三肘廣五肘毛長三指亦應分云何是可分物比丘的三衣一鉢坐具針筒剃刀漉水囊及俱夜羅器等此云小小物此是可分物現前僧應分此時先將衣物輕重揀開再當稱量説已即將衣物輕重揀開若是重物當著常作中為四方僧用若是輕物當觀察好惡若每人應得一件者好者從上座起次第分之若每人有兩件或更有多者必須好惡相參照人分派惟均平為善不得徇情輕法喜怒隨心九稱量估價法若是輕物少而大衆多者不得就分揀清楚已其受差人應白和尚云此時僧多物少不足普分請和尚稱量尚云如法估價其受差者聞已與副司稱量時衣非時衣好物惡物但取公平估之莫負亡者衣物亦要常住賣得又要買者相宜受差者雙手提衣高聲如是估唱云舊某色某衣一件作銀几錢几分縱是新衣也要加一舊字謂是故物應當如此或夏或棉隨時牒入其書記照價隨録先估衣鉢次估物件如是一一估已書記照帳再逐一唱之一人打算總結算已看共有銀多少再高聲報云共估價銀几兩几錢几分几釐大衆知已隨現前人多少或人各一分或設齋供衆或充僧買物公用若物再少者準五分律白二羯磨與無衣比丘若衆並有衣者如善見律云若一衣極好不須割破從上行之須者直付若無須者如律攝云有上好貴價衣不應割破應賣取直而共分之若人多不可分者即設一茶公用亦得此分法須五人以上作之方可若止四人則不應如是分分已其受差者居中向上合掌回復云我某甲為僧估分亡物竟尚云善答爾一拜歸位十施無衣人法衆中上坐應白衆云此某甲比丘命過所有衣物現前僧應分但物少而不足分此衆中比丘某甲無衣今遵佛敕羯磨與之惟願大衆和合發歡喜心施必為善告已方白羯磨大德僧聽衆僧得某物若僧時到僧忍聽僧今與比丘某甲白如是大德僧聽衆僧得某物僧今與比丘某甲誰諸長老忍僧與比丘某甲某物者默然誰不忍者説僧已忍與比丘某甲某物竟僧忍默然故是事如是持白已持物與之不但亡者物少如是若檀越所施之物不足分者亦應如是作法與之和尚結示云已見亡者衣物如是大家精進修行莫要慳貪知事人云大衆頂禮和尚尚云免禮各次第散十一四人直分法儀式如上送亡者去火浴已其看病比丘將亡人衣物收拾一處侍至公所知事人鳴椎俱往毗尼母云若但四人應作直分羯磨集僧問和如常所答但不説欲看病者應向餘三人作禮長跪合掌白云諸大德憶念比丘某甲命過所有衣物現前僧應分三説一叩而起其看病物餘三人量德賞勞如上酌處已義唯口和以衣付彼一人白云二大德憶念比丘某甲命過所有某物現前僧應分我等持是某物與某甲看病比丘如是三説持物與之彼應禮謝而受然後酌處餘物輕重一一分派輕物準毗尼母云若但四人應作直分羯磨當如是白大德僧聽若僧時到僧忍聽某甲比丘命過所有衣物現前僧應分白如是大德僧聽比丘某甲命過所有衣物現前僧應分誰諸長老忍僧今分是衣物者默然誰不忍者説僧已忍分是衣物竟僧忍默然故是事如是持如是白已分為四分看病者亦在其內後來比丘不得分十二三二人分法毗尼母云四人共住一人死應作展轉分捨衣已若無看病人則已若三人中有一人看病者彼亦如上持物至公所向餘比丘作禮已如是白云二大德憶念某甲比丘命過所有衣物現前衆應分如是三説餘二比丘應酌量處分若應賞勞者一人白第二人云大德憶念比丘某甲命過所有衣物現前衆應分我等持某物與某甲看病比丘如是三説持物與之待彼受已其輕物準本律應彼此三語受共分一人白云二大德憶念比丘某甲命過所有衣物應屬我等如是三説餘二人展轉之語亦如上白若但二人分者惟除去二字餘詞同上若二人中有一人看病者量德賞物直付與之但除白詞不説律云三語未了分物未入手者須一與分知事者罪福因果善須稱量十三心念取物法毗尼母論云一相應法者二人共住一人死在者應取彼衣物當心念口言此某甲亡比丘衣物應屬我作此三説已手執物故後來比丘不得分此但略記儀式廣如分衣揵度中詳明第四與覆藏行篇二種初與但覆藏羯磨十五法一露罪方便法如律所明若比丘犯僧殘罪已或覆不覆應當具慙愧心向清淨比丘或知事人前説罪其知事人然後引犯者至羯磨寮請羯磨師出知事人云展具作禮羯磨師三拜問訊長跪合掌其羯磨師從初篇問起乃至第五逐一問竟犯者如實答已一拜而起其知事人同羯磨師引彼到方丈門外立羯磨師在公位前立知事人入室請和尚出登座已羯磨師合掌作如是言有某大德犯僧殘罪發露頂禮和尚説已一拜問訊左側立知事人亦禮一拜右側立然後教犯者進門呼云問訊展大具脫鞋至誠頂禮和尚三拜問訊長跪合掌和尚問云你是那一年的戒既受戒已受了檀越信施云何不持戒以何因緣而犯此事直説莫要打枝繞犯者如實答云我某甲是某年某期戒一時業障心起不能制伏故犯此戒求和尚慈悲懺悔又問云初篇四根本有犯否犯者如實答已知事人呼云起立禮謝和尚三拜起具問訊其羯磨師與知事人如前禮辭而退和尚入室已犯者禮謝羯磨師畢然後到堂中禮謝知事人請文熟讀其知事人再細問犯者是某年某月某日而犯此罪或一或二及與衆多有覆無覆不論年月唯算日數有日算日不得徇情總算日數有幾千幾百幾十日已再詳問彼故妄無知五品小罪具與不具一一如上稱量定已令彼暫司其寫文式先寫乞羯磨文次寫請懺悔主及四品從生根本小罪并故妄無知波逸提法後寫白行行法如上斟酌寫清楚已方授與欲令其熟背二鳴椎集衆法犯者背熟文已往堂中禮白知事人其知事人先令彼背遇語詞不謬者然後通白和尚引彼頂禮及往各堂衆寮禮請大衆師畢再到方丈請問何時作法如時定已先應差人索欲時至打揵椎如懺摩法打鼓五十四下大衆聞之各整威儀至作法處衆齊集已知事人應先觀察衆中有未受具戒者遣出方去知會侍司請出和尚至作法處知事人云大衆頂禮和尚尚云免禮知事人呼犯者向上展大具脫鞋先頂禮和尚三拜尚云普禮僧足大衆齊合掌拜已知事人云問訊長跪合掌三呈白犯緣法和尚云説你犯戒的因緣犯者即高聲實情對衆云我某甲從某年求戒以來至某年某月某日一時愚癡業障心起不能制伏故犯此戒今求和尚大衆師傅慈悲四乞允羯磨法和尚云大衆知道